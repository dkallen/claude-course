<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module 2 Flashcards</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const FLASHCARDS = [
      {
        id: 1,
        front: "What is CLAUDE.md?",
        back: "A plain-text Markdown file that gives Claude Code persistent instructions about your project, conventions, and way of working. It's read automatically at the start of every session — no setup required."
      },
      {
        id: 2,
        front: "Where are the three places CLAUDE.md can live?",
        back: "1) ~/.claude/CLAUDE.md (global — applies to all projects), 2) Project root CLAUDE.md (applies to this project), 3) Subfolder CLAUDE.md (applies to that folder only). Instructions cascade: global → project → folder."
      },
      {
        id: 3,
        front: "Which level takes precedence when instructions conflict?",
        back: "More specific wins. Folder-level overrides project-level, which overrides global. This lets you set broad defaults globally and customize per-project or per-folder."
      },
      {
        id: 4,
        front: "What belongs in CLAUDE.md vs. in a prompt?",
        back: "CLAUDE.md: persistent context that should survive across sessions — conventions, frameworks, standards, architecture decisions. Prompts: session-specific instructions, one-off tasks, contextual details about what you're doing right now."
      },
      {
        id: 5,
        front: "How does CLAUDE.md solve the compaction problem from Module 1?",
        back: "CLAUDE.md is re-read at the start of every session. Unlike conversation history (which gets compacted and can lose details), CLAUDE.md instructions are always fresh and complete. It's your hedge against Claude forgetting."
      },
      {
        id: 6,
        front: "What's the anti-pattern of a CLAUDE.md that's too long?",
        back: "Claude processes CLAUDE.md like any other context. An extremely long file means instructions compete for attention — some will be followed inconsistently. Keep it focused: aim for quality over quantity. A few well-chosen rules beat a hundred vague ones."
      },
      {
        id: 7,
        front: "What's the anti-pattern of contradictory instructions?",
        back: "If CLAUDE.md says 'always write tests' AND 'move fast, skip non-essentials,' Claude will be inconsistent — sometimes testing, sometimes not. Review your CLAUDE.md for instructions that pull in opposite directions."
      },
      {
        id: 8,
        front: "What is .claudeignore?",
        back: "A file (like .gitignore) that tells Claude Code which files and directories to skip when reading your project. Useful for keeping large generated files, build artifacts, or sensitive data out of Claude's context window."
      },
      {
        id: 9,
        front: "Give an example of an effective CLAUDE.md instruction.",
        back: "Good: 'When analyzing any feature request, apply this framework: Goals → Problems → Solutions → Risks → Scope.' This is specific, actionable, and tells Claude both what to do and how to structure it."
      },
      {
        id: 10,
        front: "Give an example of a bad CLAUDE.md instruction.",
        back: "Bad: 'Write good code.' This is too vague — Claude already tries to write good code. Effective instructions are specific and actionable: 'Use async/await instead of .then() chains' or 'All API responses must include error handling.'"
      },
      {
        id: 11,
        front: "Should you put task-specific details in CLAUDE.md?",
        back: "No. CLAUDE.md is for persistent conventions, not current tasks. 'Build the login page with OAuth' belongs in a prompt. 'Always use our auth utility at src/lib/auth.ts for authentication flows' belongs in CLAUDE.md."
      },
      {
        id: 12,
        front: "What's the best CLAUDE.md strategy for a monorepo?",
        back: "One root CLAUDE.md with shared conventions (linting, commit style, CI rules), plus folder-level CLAUDE.md files for each sub-project with their specific tech stack, testing patterns, and conventions."
      }
    ];

    const STORAGE_KEY = "module-2-flashcard-state";

    const styles = {
      container: {
        fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif",
        maxWidth: 640,
        margin: "0 auto",
        padding: "2rem 1rem",
        color: "#1a1a1a"
      },
      header: {
        marginBottom: "1.5rem"
      },
      title: {
        fontSize: "1.75rem",
        fontWeight: 600,
        marginBottom: "0.5rem"
      },
      counter: {
        fontSize: "0.9rem",
        color: "#666"
      },
      filterContainer: {
        display: "flex",
        gap: "0.5rem",
        marginBottom: "1.5rem",
        flexWrap: "wrap"
      },
      filterPill: (isActive) => ({
        padding: "0.5rem 1rem",
        border: isActive ? "none" : "1px solid #e0e0e0",
        borderRadius: "20px",
        backgroundColor: isActive ? "#1a1a1a" : "white",
        color: isActive ? "white" : "#1a1a1a",
        cursor: "pointer",
        fontSize: "0.9rem",
        fontWeight: 500,
        transition: "all 0.2s"
      }),
      cardList: {
        display: "flex",
        flexDirection: "column",
        gap: "0.75rem",
        marginBottom: "1.5rem"
      },
      cardItem: (status) => ({
        display: "flex",
        justifyContent: "space-between",
        alignItems: "center",
        padding: "1rem",
        backgroundColor: "#fafafa",
        border: "1px solid #e5e5e5",
        borderLeft: status === "review" ? "4px solid #d88" : status === "known" ? "4px solid #8c8" : "4px solid transparent",
        borderRadius: "8px",
        cursor: "pointer",
        transition: "background-color 0.2s"
      }),
      cardText: {
        flex: 1,
        fontSize: "0.95rem",
        lineHeight: 1.4
      },
      cardButtonsContainer: {
        display: "flex",
        gap: "0.5rem",
        marginLeft: "1rem"
      },
      miniButton: {
        padding: "0.25rem 0.5rem",
        fontSize: "0.8rem",
        border: "1px solid #e0e0e0",
        backgroundColor: "white",
        cursor: "pointer",
        borderRadius: "4px",
        transition: "all 0.2s"
      },
      studyButton: {
        display: "inline-block",
        padding: "0.75rem 1.5rem",
        backgroundColor: "#1a1a1a",
        color: "white",
        border: "none",
        borderRadius: "8px",
        cursor: "pointer",
        fontSize: "0.95rem",
        fontWeight: 500,
        marginBottom: "1.5rem"
      },
      footer: {
        fontSize: "0.85rem",
        color: "#666",
        borderTop: "1px solid #e5e5e5",
        paddingTop: "1rem",
        display: "flex",
        justifyContent: "space-between"
      },
      footerLink: {
        color: "#1a1a1a",
        cursor: "pointer",
        textDecoration: "none",
        borderBottom: "1px solid #1a1a1a"
      },
      studyContainer: {
        marginBottom: "2rem"
      },
      backLink: {
        color: "#1a1a1a",
        cursor: "pointer",
        textDecoration: "none",
        borderBottom: "1px solid #1a1a1a",
        fontSize: "0.9rem",
        marginBottom: "1.5rem",
        display: "inline-block"
      },
      studyCard: {
        backgroundColor: "#fafafa",
        border: "1px solid #e5e5e5",
        borderRadius: "12px",
        padding: "3rem 1.5rem",
        minHeight: "300px",
        display: "flex",
        flexDirection: "column",
        justifyContent: "center",
        alignItems: "center",
        textAlign: "center",
        cursor: "pointer",
        marginBottom: "1.5rem"
      },
      cardLabel: {
        fontSize: "0.75rem",
        color: "#999",
        textTransform: "uppercase",
        letterSpacing: "0.05em",
        marginBottom: "1rem"
      },
      cardContent: {
        fontSize: "1.2rem",
        lineHeight: 1.6,
        marginBottom: "1rem"
      },
      cardHint: {
        fontSize: "0.8rem",
        color: "#999",
        marginTop: "1rem",
        fontStyle: "italic"
      },
      buttonsContainer: {
        display: "flex",
        gap: "1rem",
        justifyContent: "center",
        marginTop: "1.5rem"
      },
      primaryButton: {
        padding: "0.75rem 1.5rem",
        backgroundColor: "#1a1a1a",
        color: "white",
        border: "none",
        borderRadius: "8px",
        cursor: "pointer",
        fontSize: "0.95rem",
        fontWeight: 500
      },
      secondaryButton: {
        padding: "0.75rem 1.5rem",
        backgroundColor: "white",
        color: "#1a1a1a",
        border: "1px solid #e0e0e0",
        borderRadius: "8px",
        cursor: "pointer",
        fontSize: "0.95rem",
        fontWeight: 500
      },
      navContainer: {
        display: "flex",
        justifyContent: "space-between",
        alignItems: "center",
        paddingTop: "1rem",
        borderTop: "1px solid #e5e5e5"
      },
      navLink: {
        color: "#1a1a1a",
        cursor: "pointer",
        textDecoration: "none",
        borderBottom: "1px solid #1a1a1a",
        fontSize: "0.9rem"
      },
      counter2: {
        fontSize: "0.9rem",
        color: "#666"
      }
    };

    function useLocalStorage(key, initialValue) {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) {
          return initialValue;
        }
      });

      const setValue = (value) => {
        try {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);
          window.localStorage.setItem(key, JSON.stringify(valueToStore));
        } catch (error) {
          console.error(error);
        }
      };

      return [storedValue, setValue];
    }

    function FlashcardApp() {
      const [cardStates, setCardStates] = useLocalStorage(STORAGE_KEY, {});
      const [mode, setMode] = useState("index");
      const [filter, setFilter] = useState("all");
      const [currentCardIndex, setCurrentCardIndex] = useState(0);
      const [isFlipped, setIsFlipped] = useState(false);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (mode === "study") {
            if (e.code === "Space" || e.code === "Enter") {
              e.preventDefault();
              setIsFlipped(!isFlipped);
            } else if (e.code === "ArrowLeft") {
              e.preventDefault();
              goToPrevious();
            } else if (e.code === "ArrowRight") {
              e.preventDefault();
              goToNext();
            } else if (e.code === "Escape") {
              e.preventDefault();
              goBackToIndex();
            }
          }
        };

        window.addEventListener("keydown", handleKeyDown);
        return () => window.removeEventListener("keydown", handleKeyDown);
      }, [mode, isFlipped]);

      const getCardStatus = (cardId) => {
        if (!cardStates[cardId]) return "unseen";
        if (cardStates[cardId] === "known") return "known";
        if (cardStates[cardId] === "review") return "review";
        return "unseen";
      };

      const filteredCards = FLASHCARDS.filter((card) => {
        const status = getCardStatus(card.id);
        if (filter === "all") return true;
        if (filter === "review") return status === "review";
        if (filter === "known") return status === "known";
        if (filter === "unseen") return status === "unseen";
        return true;
      });

      const counts = {
        all: FLASHCARDS.length,
        review: FLASHCARDS.filter((c) => getCardStatus(c.id) === "review").length,
        known: FLASHCARDS.filter((c) => getCardStatus(c.id) === "known").length,
        unseen: FLASHCARDS.filter((c) => getCardStatus(c.id) === "unseen").length
      };

      const handleCardClick = (index) => {
        setCurrentCardIndex(index);
        setMode("study");
        setIsFlipped(false);
      };

      const handleStudyButtonClick = () => {
        const filtered = FLASHCARDS.filter((card) => {
          const status = getCardStatus(card.id);
          if (filter === "all") return true;
          if (filter === "review") return status === "review";
          if (filter === "known") return status === "known";
          if (filter === "unseen") return status === "unseen";
          return true;
        });
        if (filtered.length > 0) {
          const indexInFiltered = filtered.findIndex((c) => c.id === filteredCards[0].id);
          const indexInAll = FLASHCARDS.findIndex((c) => c.id === filteredCards[0].id);
          setCurrentCardIndex(indexInAll);
          setMode("study");
          setIsFlipped(false);
        }
      };

      const markCard = (status) => {
        const card = FLASHCARDS[currentCardIndex];
        setCardStates((prev) => ({
          ...prev,
          [card.id]: status
        }));
        goToNext();
      };

      const goToNext = () => {
        const nextIndex = (currentCardIndex + 1) % FLASHCARDS.length;
        setCurrentCardIndex(nextIndex);
        setIsFlipped(false);
      };

      const goToPrevious = () => {
        const prevIndex = currentCardIndex === 0 ? FLASHCARDS.length - 1 : currentCardIndex - 1;
        setCurrentCardIndex(prevIndex);
        setIsFlipped(false);
      };

      const goBackToIndex = () => {
        setMode("index");
        setIsFlipped(false);
      };

      const resetProgress = () => {
        if (confirm("Are you sure? This will reset all progress.")) {
          setCardStates({});
        }
      };

      const toggleCardStatus = (cardId, e) => {
        e.stopPropagation();
        const current = getCardStatus(cardId);
        const next = current === "unseen" ? "review" : current === "review" ? "known" : "unseen";
        setCardStates((prev) => ({
          ...prev,
          [cardId]: next
        }));
      };

      const knownCount = FLASHCARDS.filter((c) => getCardStatus(c.id) === "known").length;

      if (mode === "study") {
        const card = FLASHCARDS[currentCardIndex];
        return (
          <div style={styles.container}>
            <div style={styles.studyContainer}>
              <a style={styles.backLink} onClick={goBackToIndex}>
                ← Back to index
              </a>

              <div style={styles.studyCard} onClick={() => setIsFlipped(!isFlipped)}>
                <div style={styles.cardLabel}>{isFlipped ? "Answer" : "Question"}</div>
                <div style={styles.cardContent}>{isFlipped ? card.back : card.front}</div>
                <div style={styles.cardHint}>
                  {isFlipped ? "click to see question" : "click to reveal answer"}
                </div>
              </div>

              {isFlipped && (
                <div style={styles.buttonsContainer}>
                  <button
                    style={styles.secondaryButton}
                    onClick={() => markCard("review")}
                  >
                    Needs review
                  </button>
                  <button
                    style={styles.primaryButton}
                    onClick={() => markCard("known")}
                  >
                    Got it
                  </button>
                </div>
              )}

              <div style={styles.navContainer}>
                <a
                  style={styles.navLink}
                  onClick={goToPrevious}
                  onMouseEnter={(e) => (e.target.style.opacity = "0.7")}
                  onMouseLeave={(e) => (e.target.style.opacity = "1")}
                >
                  ← Previous
                </a>
                <span style={styles.counter2}>
                  {currentCardIndex + 1} / {FLASHCARDS.length}
                </span>
                <a
                  style={styles.navLink}
                  onClick={goToNext}
                  onMouseEnter={(e) => (e.target.style.opacity = "0.7")}
                  onMouseLeave={(e) => (e.target.style.opacity = "1")}
                >
                  Next →
                </a>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div style={styles.container}>
          <div style={styles.header}>
            <h1 style={styles.title}>Module 2 Flashcards</h1>
            <p style={styles.counter}>
              {knownCount} / {FLASHCARDS.length} known
            </p>
          </div>

          <div style={styles.filterContainer}>
            {["All", "Needs review", "Known", "Unseen"].map((label, idx) => {
              const filterKey = label === "All" ? "all" : label === "Needs review" ? "review" : label === "Known" ? "known" : "unseen";
              const count = counts[filterKey];
              const isActive = filter === filterKey;
              return (
                <button
                  key={filterKey}
                  style={styles.filterPill(isActive)}
                  onClick={() => setFilter(filterKey)}
                >
                  {label} ({count})
                </button>
              );
            })}
          </div>

          <div style={styles.cardList}>
            {filteredCards.map((card, idx) => (
              <div
                key={card.id}
                style={styles.cardItem(getCardStatus(card.id))}
                onClick={() => handleCardClick(FLASHCARDS.findIndex((c) => c.id === card.id))}
              >
                <div style={styles.cardText}>{card.front}</div>
                <div style={styles.cardButtonsContainer}>
                  <button
                    style={{
                      ...styles.miniButton,
                      backgroundColor: getCardStatus(card.id) === "review" ? "#d88" : "white",
                      color: getCardStatus(card.id) === "review" ? "white" : "#1a1a1a"
                    }}
                    onClick={(e) => toggleCardStatus(card.id, e)}
                  >
                    R
                  </button>
                  <button
                    style={{
                      ...styles.miniButton,
                      backgroundColor: getCardStatus(card.id) === "known" ? "#8c8" : "white",
                      color: getCardStatus(card.id) === "known" ? "white" : "#1a1a1a"
                    }}
                    onClick={(e) => {
                      e.stopPropagation();
                      const current = getCardStatus(card.id);
                      setCardStates((prev) => ({
                        ...prev,
                        [card.id]: current === "known" ? "unseen" : "known"
                      }));
                    }}
                  >
                    K
                  </button>
                </div>
              </div>
            ))}
          </div>

          <button style={styles.studyButton} onClick={handleStudyButtonClick}>
            Study {filter !== "all" && filter !== "unseen" ? filter : filter} ({filteredCards.length})
          </button>

          <div style={styles.footer}>
            <a style={styles.footerLink} onClick={resetProgress}>
              Reset all progress
            </a>
            <span>Click any card to study it</span>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<FlashcardApp />);
  </script>
<script src="../notes-widget.js"></script>
</body>
</html>
