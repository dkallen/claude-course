<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module 2 Quiz - CLAUDE.md Mastery</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const s = {
      container: {
        fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif",
        maxWidth: 700,
        margin: "0 auto",
        padding: "2rem 1rem",
        color: "#1a1a1a",
      },
      header: {
        marginBottom: "2rem",
      },
      title: {
        fontSize: "2rem",
        fontWeight: 700,
        marginBottom: "0.5rem",
      },
      subtitle: {
        fontSize: "1rem",
        color: "#666",
      },
      progressContainer: {
        position: "absolute",
        top: "2rem",
        right: "1rem",
        fontSize: "0.875rem",
        color: "#666",
      },
      scenario: {
        backgroundColor: "#f5f5f5",
        border: "1px solid #e0e0e0",
        borderRadius: "6px",
        padding: "1rem",
        marginBottom: "1.5rem",
        fontSize: "0.95rem",
        lineHeight: 1.6,
      },
      scenarioLabel: {
        fontWeight: 600,
        marginBottom: "0.5rem",
        fontSize: "0.875rem",
        textTransform: "uppercase",
        letterSpacing: "0.5px",
        color: "#999",
      },
      questionContainer: {
        marginBottom: "1.5rem",
      },
      question: {
        fontSize: "1.1rem",
        fontWeight: 600,
        marginBottom: "1rem",
      },
      optionsContainer: {
        display: "flex",
        flexDirection: "column",
        gap: "0.75rem",
      },
      option: {
        padding: "1rem",
        border: "2px solid #ddd",
        borderRadius: "6px",
        cursor: "pointer",
        backgroundColor: "#fff",
        transition: "all 0.2s ease",
        fontSize: "0.95rem",
        lineHeight: 1.5,
      },
      optionHover: {
        borderColor: "#999",
        backgroundColor: "#fafafa",
      },
      optionSelected: {
        borderColor: "#1a1a1a",
        backgroundColor: "#f9f9f9",
      },
      optionCorrect: {
        backgroundColor: "#f0f7f0",
        borderColor: "#b8d4b8",
      },
      optionWrong: {
        backgroundColor: "#fdf0f0",
        borderColor: "#dbb",
      },
      explanation: {
        marginTop: "1.5rem",
        padding: "1rem",
        backgroundColor: "#f9f9f9",
        border: "1px solid #e0e0e0",
        borderRadius: "6px",
        fontSize: "0.95rem",
        lineHeight: 1.6,
      },
      explanationLabel: {
        fontWeight: 600,
        marginBottom: "0.5rem",
        fontSize: "0.875rem",
        textTransform: "uppercase",
        letterSpacing: "0.5px",
        color: "#999",
      },
      button: {
        marginTop: "1.5rem",
        padding: "0.75rem 1.5rem",
        backgroundColor: "#1a1a1a",
        color: "white",
        border: "none",
        borderRadius: "6px",
        fontSize: "0.95rem",
        fontWeight: 600,
        cursor: "pointer",
        transition: "all 0.2s ease",
      },
      buttonHover: {
        backgroundColor: "#333",
      },
      resultsContainer: {
        textAlign: "center",
      },
      score: {
        fontSize: "3rem",
        fontWeight: 700,
        marginBottom: "0.5rem",
      },
      percentage: {
        fontSize: "1.5rem",
        color: "#666",
        marginBottom: "1.5rem",
      },
      message: {
        fontSize: "1rem",
        lineHeight: 1.8,
        color: "#333",
        marginBottom: "2rem",
        maxWidth: "90%",
        marginLeft: "auto",
        marginRight: "auto",
      },
      messageExcellent: {
        color: "#2d6b2d",
      },
      messageGood: {
        color: "#666",
      },
      messagePoor: {
        color: "#8b4545",
      },
    };

    const questions = [
      {
        id: 1,
        scenario: "You're starting a new project and writing your first CLAUDE.md. You include your preferred coding style, the project's tech stack, your team's testing conventions, AND a detailed walkthrough of the feature you're about to build.",
        question: "What's wrong with this CLAUDE.md?",
        options: [
          {
            text: "The feature walkthrough doesn't belong — CLAUDE.md is for persistent conventions, not session-specific tasks. Put the feature details in your prompt instead.",
            isCorrect: true,
          },
          {
            text: "It's too short",
            isCorrect: false,
          },
          {
            text: "The tech stack doesn't belong",
            isCorrect: false,
          },
          {
            text: "Nothing is wrong",
            isCorrect: false,
          },
        ],
        explanation: "CLAUDE.md should contain conventions, patterns, and rules that apply across your entire project — not one-time instructions for a specific feature. Session-specific details belong in your prompt for that session.",
      },
      {
        id: 2,
        scenario: "You have a global CLAUDE.md at ~/.claude/CLAUDE.md that says 'Always use TypeScript.' Your project CLAUDE.md says 'This project uses JavaScript.' You ask Claude to create a new utility function.",
        question: "What language will Claude use?",
        options: [
          {
            text: "JavaScript — project-level instructions override global for this project context.",
            isCorrect: true,
          },
          {
            text: "TypeScript (global takes precedence)",
            isCorrect: false,
          },
          {
            text: "It will ask which one",
            isCorrect: false,
          },
          {
            text: "It depends on the file extension",
            isCorrect: false,
          },
        ],
        explanation: "Project-level CLAUDE.md files take precedence over global ones. When both exist, the closer (more specific) file wins. This allows teams to override personal preferences with project conventions.",
      },
      {
        id: 3,
        scenario: "Your CLAUDE.md is 500 lines long. It covers every possible convention, edge case, and preference you can think of. Claude seems to follow some rules but ignore others inconsistently.",
        question: "What's most likely the issue?",
        options: [
          {
            text: "The CLAUDE.md is too long — Claude processes it like any other context, and an overly long file means some instructions get less attention. Keep it focused.",
            isCorrect: true,
          },
          {
            text: "500 lines exceeds a hard limit",
            isCorrect: false,
          },
          {
            text: "Claude randomly ignores instructions",
            isCorrect: false,
          },
          {
            text: "You need to number each rule",
            isCorrect: false,
          },
        ],
        explanation: "While there's no hard limit, overly long CLAUDE.md files suffer from context dilution — important conventions get lost in the noise. Focus on 20–30 high-impact rules rather than exhaustive coverage. Quality over quantity.",
      },
      {
        id: 4,
        scenario: "You add to your CLAUDE.md: 'When analyzing any new idea or feature request, apply this framework: start with Goals, identify Problems, propose Solutions, assess Risks, define Scope.' You then ask Claude: 'I'm thinking about adding a dark mode feature.'",
        question: "What should you expect?",
        options: [
          {
            text: "Claude should structure its response using the framework — starting with goals for dark mode, identifying problems it solves, proposing solutions, etc. — without you having to ask for the framework explicitly.",
            isCorrect: true,
          },
          {
            text: "Claude will ignore it (CLAUDE.md doesn't affect chat)",
            isCorrect: false,
          },
          {
            text: "Claude will ask you which framework to use",
            isCorrect: false,
          },
          {
            text: "Claude will refuse because it's not a coding task",
            isCorrect: false,
          },
        ],
        explanation: "CLAUDE.md defines your thinking patterns, analysis frameworks, and problem-solving approaches. When you define a framework, Claude will apply it to relevant questions automatically — that's the power of persistent conventions.",
      },
      {
        id: 5,
        scenario: "Your CLAUDE.md says 'Always write tests for new functions' and also says 'Move fast — skip anything that isn't strictly necessary for the feature to work.'",
        question: "What will likely happen?",
        options: [
          {
            text: "Claude will be inconsistent — sometimes writing tests, sometimes skipping them — because the instructions contradict each other. Contradictory CLAUDE.md instructions are a common anti-pattern.",
            isCorrect: true,
          },
          {
            text: "Claude will always write tests (explicit beats implicit)",
            isCorrect: false,
          },
          {
            text: "Claude will always skip tests (the second rule overrides)",
            isCorrect: false,
          },
          {
            text: "Claude will ask for clarification each time",
            isCorrect: false,
          },
        ],
        explanation: "Contradictory instructions create confusion and inconsistency. Your CLAUDE.md should be coherent — resolve conflicts by choosing priorities. For example: 'Write tests for critical functions, but skip for quick experiments' clarifies the rule.",
      },
      {
        id: 6,
        scenario: "You're working on a monorepo with a React frontend and a Python backend. You want different conventions for each.",
        question: "What's the best CLAUDE.md setup?",
        options: [
          {
            text: "One project-root CLAUDE.md with shared conventions, plus folder-level CLAUDE.md files in frontend/ and backend/ with their specific rules.",
            isCorrect: true,
          },
          {
            text: "One giant CLAUDE.md with everything",
            isCorrect: false,
          },
          {
            text: "Two separate projects",
            isCorrect: false,
          },
          {
            text: "Put all rules in the global CLAUDE.md",
            isCorrect: false,
          },
        ],
        explanation: "Hierarchy matters. Use a root CLAUDE.md for shared conventions (code style, testing approach, git workflow) and folder-level files to override with tech-specific rules. Claude finds and reads the most specific file first.",
      },
      {
        id: 7,
        scenario: "You've been using CLAUDE.md successfully for a week. A colleague joins the project and asks 'do I need to install anything special for this CLAUDE.md thing to work?'",
        question: "What do you tell them?",
        options: [
          {
            text: "No installation needed — Claude Code automatically reads CLAUDE.md files from the project. Just make sure the file is committed to the repo so everyone gets the same conventions.",
            isCorrect: true,
          },
          {
            text: "They need to enable it in settings",
            isCorrect: false,
          },
          {
            text: "They need to copy it to their ~/.claude/ folder",
            isCorrect: false,
          },
          {
            text: "CLAUDE.md only works for the person who created it",
            isCorrect: false,
          },
        ],
        explanation: "CLAUDE.md is automatic — no installation or configuration needed. Claude Code looks for CLAUDE.md files when you're in a project directory and applies them transparently. Commit to your repo so the whole team benefits.",
      },
      {
        id: 8,
        scenario: "You notice Claude keeps using console.log for debugging in your production code. You want to stop this.",
        question: "Where should you put the instruction 'Never use console.log in production code — use the project's logging utility instead'?",
        options: [
          {
            text: "In the project CLAUDE.md — this is a project-level convention that should persist across all sessions and apply to everyone on the team.",
            isCorrect: true,
          },
          {
            text: "In your prompt each time",
            isCorrect: false,
          },
          {
            text: "In the global CLAUDE.md",
            isCorrect: false,
          },
          {
            text: "In a .claudeignore file",
            isCorrect: false,
          },
        ],
        explanation: "Project conventions belong in the project CLAUDE.md — that's exactly the use case. This way, everyone on the team follows the same logging rule without having to mention it in every prompt.",
      },
    ];

    function QuizApp() {
      const [currentQuestion, setCurrentQuestion] = useState(0);
      const [selectedOption, setSelectedOption] = useState(null);
      const [answered, setAnswered] = useState(false);
      const [score, setScore] = useState(0);
      const [completed, setCompleted] = useState(false);

      const handleOptionClick = (index) => {
        if (answered) return;
        setSelectedOption(index);
      };

      const handleSubmit = () => {
        if (selectedOption === null) return;
        setAnswered(true);

        const question = questions[currentQuestion];
        if (question.options[selectedOption].isCorrect) {
          setScore(score + 1);
        }
      };

      const handleNext = () => {
        if (currentQuestion < questions.length - 1) {
          setCurrentQuestion(currentQuestion + 1);
          setSelectedOption(null);
          setAnswered(false);
        } else {
          setCompleted(true);
        }
      };

      const handleTryAgain = () => {
        setCurrentQuestion(0);
        setSelectedOption(null);
        setAnswered(false);
        setScore(0);
        setCompleted(false);
      };

      if (completed) {
        const percentage = Math.round((score / questions.length) * 100);
        let messageText = "";
        let messageStyle = s.messageGood;

        if (percentage >= 88) {
          messageText =
            "Excellent. You understand how to configure Claude's persistent memory. You're ready to start writing effective CLAUDE.md files.";
          messageStyle = s.messageExcellent;
        } else if (percentage >= 63) {
          messageText =
            "Good foundation. Review the explanations for the ones you missed — the nuances about hierarchy and anti-patterns matter.";
          messageStyle = s.messageGood;
        } else {
          messageText =
            "Worth revisiting the lesson before moving on. Understanding CLAUDE.md is foundational — it affects everything you do with Claude Code.";
          messageStyle = s.messagePoor;
        }

        return (
          <div style={s.container}>
            <div style={s.header}>
              <div style={s.title}>Quiz Complete</div>
            </div>

            <div style={s.resultsContainer}>
              <div style={s.score}>
                {score}/{questions.length}
              </div>
              <div style={s.percentage}>{percentage}%</div>
              <div style={{ ...s.message, ...messageStyle }}>{messageText}</div>

              <button
                style={s.button}
                onMouseEnter={(e) =>
                  (e.target.style.backgroundColor = s.buttonHover.backgroundColor)
                }
                onMouseLeave={(e) =>
                  (e.target.style.backgroundColor = s.button.backgroundColor)
                }
                onClick={handleTryAgain}
              >
                Try Again
              </button>
            </div>
          </div>
        );
      }

      const question = questions[currentQuestion];
      const buttonDisabled = selectedOption === null || answered;

      return (
        <div style={s.container}>
          <div style={s.progressContainer}>
            {currentQuestion + 1} of {questions.length}
          </div>

          <div style={s.header}>
            <div style={s.title}>Module 2 Quiz</div>
            <div style={s.subtitle}>CLAUDE.md Mastery</div>
          </div>

          <div style={s.scenario}>
            <div style={s.scenarioLabel}>Scenario</div>
            <div>{question.scenario}</div>
          </div>

          <div style={s.questionContainer}>
            <div style={s.question}>{question.question}</div>

            <div style={s.optionsContainer}>
              {question.options.map((option, index) => {
                let optionStyle = { ...s.option };

                if (answered) {
                  if (option.isCorrect) {
                    optionStyle = { ...optionStyle, ...s.optionCorrect };
                  } else if (selectedOption === index) {
                    optionStyle = { ...optionStyle, ...s.optionWrong };
                  }
                } else if (selectedOption === index) {
                  optionStyle = { ...optionStyle, ...s.optionSelected };
                }

                return (
                  <div
                    key={index}
                    style={optionStyle}
                    onClick={() => handleOptionClick(index)}
                    onMouseEnter={(e) => {
                      if (!answered && selectedOption !== index) {
                        e.currentTarget.style.borderColor =
                          s.optionHover.borderColor;
                        e.currentTarget.style.backgroundColor =
                          s.optionHover.backgroundColor;
                      }
                    }}
                    onMouseLeave={(e) => {
                      if (!answered && selectedOption !== index) {
                        e.currentTarget.style.borderColor = "#ddd";
                        e.currentTarget.style.backgroundColor = "#fff";
                      }
                    }}
                  >
                    {option.text}
                  </div>
                );
              })}
            </div>

            {!answered && (
              <button
                style={{
                  ...s.button,
                  opacity: buttonDisabled ? 0.5 : 1,
                  cursor: buttonDisabled ? "not-allowed" : "pointer",
                }}
                onMouseEnter={(e) => {
                  if (!buttonDisabled) {
                    e.target.style.backgroundColor =
                      s.buttonHover.backgroundColor;
                  }
                }}
                onMouseLeave={(e) => {
                  if (!buttonDisabled) {
                    e.target.style.backgroundColor = s.button.backgroundColor;
                  }
                }}
                onClick={handleSubmit}
                disabled={buttonDisabled}
              >
                Submit
              </button>
            )}

            {answered && (
              <>
                <div style={s.explanation}>
                  <div style={s.explanationLabel}>Explanation</div>
                  <div>{question.explanation}</div>
                </div>

                <button
                  style={s.button}
                  onMouseEnter={(e) =>
                    (e.target.style.backgroundColor =
                      s.buttonHover.backgroundColor)
                  }
                  onMouseLeave={(e) =>
                    (e.target.style.backgroundColor = s.button.backgroundColor)
                  }
                  onClick={handleNext}
                >
                  {currentQuestion === questions.length - 1
                    ? "See Results"
                    : "Next Question"}
                </button>
              </>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<QuizApp />, document.getElementById("root"));
  </script>
<script src="../notes-widget.js"></script>
</body>
</html>
