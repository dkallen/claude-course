<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 6 — Scenario Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 0.35rem; }
  .subtitle { color: #666; margin-bottom: 1.5rem; }
  .card { border: 1px solid #eee; border-radius: 12px; background: #fafafa; padding: 1rem; }
  .progress { font-size: 0.85rem; color: #777; margin-bottom: 1rem; font-weight: 600; }
  .question { font-size: 1rem; line-height: 1.55; margin-bottom: 1rem; }
  .options { display: grid; gap: 0.65rem; }
  button.option { text-align: left; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font: inherit; }
  button.option:hover { border-color: #aaa; }
  .feedback { margin-top: 1rem; padding: 0.85rem; border-radius: 8px; font-size: 0.92rem; line-height: 1.55; display: none; }
  .feedback.correct { background: #f0fdf4; color: #166534; display: block; }
  .feedback.incorrect { background: #fef2f2; color: #991b1b; display: block; }
  .next { margin-top: 1rem; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 0.8rem 1rem; font: inherit; cursor: pointer; display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>Module 6: Scenario Quiz</h1>
  <p class="subtitle">Test whether you can tell real TDD from test-shaped theater.</p>
  <div class="card">
    <div class="progress" id="progress"></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next" id="next-btn">Next</button>
  </div>
</div>
<script>
const questions = [
  {
    q: "Claude writes a test for a new feature and it already passes before any implementation exists. What is the right conclusion?",
    options: ["The feature was simpler than expected", "The red phase failed and the test is likely weak or pointed at the wrong behavior", "You can skip implementation", "The framework is working perfectly"],
    answer: 1,
    explanation: "A test that passes before the behavior exists is not protecting the change in the way TDD requires."
  },
  {
    q: "Why is TDD especially useful with AI-assisted coding?",
    options: ["It makes prompts shorter", "It gives Claude an executable specification instead of prose alone", "It removes the need for review", "It guarantees clean architecture automatically"],
    answer: 1,
    explanation: "Tests narrow the agent's room for interpretation and make success more concrete."
  },
  {
    q: "Which request is strongest for the red phase?",
    options: ["Build the feature and add tests", "Write tests only from these requirements and stop before implementation", "Refactor the module first", "Improve the code quality somehow"],
    answer: 1,
    explanation: "Splitting test generation from implementation is what preserves the red signal."
  },
  {
    q: "What is the strongest sign a test is implementation-shaped rather than behavior-shaped?",
    options: ["It uses one mock", "It asserts internal helper calls instead of the externally visible outcome", "It has more than one assertion", "It runs fast"],
    answer: 1,
    explanation: "Behavior-shaped tests care about what the system does, not how Claude happened to structure the code."
  },
  {
    q: "When should refactoring happen in the loop?",
    options: ["Before tests exist", "After the tests are green", "At the same time as the red phase", "Instead of the green phase"],
    answer: 1,
    explanation: "Refactoring is safest after behavior is protected."
  },
  {
    q: "When is an integration test more valuable than a unit test?",
    options: ["When the risk lives in how multiple pieces interact", "Whenever the code is short", "Only when unit tests are impossible", "Never"],
    answer: 0,
    explanation: "If the real failure mode is at the boundary between components, integration coverage is often the more truthful first test."
  }
];

let current = 0;
let locked = false;

function renderQuestion() {
  locked = false;
  const item = questions[current];
  document.getElementById("progress").textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById("question").textContent = item.q;
  const optionsEl = document.getElementById("options");
  optionsEl.innerHTML = "";
  item.options.forEach((option, idx) => {
    const button = document.createElement("button");
    button.className = "option";
    button.textContent = option;
    button.addEventListener("click", () => answer(idx));
    optionsEl.appendChild(button);
  });
  document.getElementById("feedback").className = "feedback";
  document.getElementById("feedback").textContent = "";
  document.getElementById("next-btn").style.display = "none";
}

function answer(idx) {
  if (locked) return;
  locked = true;
  const item = questions[current];
  const feedback = document.getElementById("feedback");
  feedback.className = "feedback " + (idx === item.answer ? "correct" : "incorrect");
  feedback.textContent = item.explanation;
  document.getElementById("next-btn").style.display = "inline-block";
}

document.getElementById("next-btn").addEventListener("click", () => {
  current += 1;
  if (current >= questions.length) {
    document.querySelector(".card").innerHTML = "<h2 style='margin-bottom:0.5rem;'>Quiz complete</h2><p style='line-height:1.6;color:#444;'>If your mistakes cluster around weak tests or stage collapse, that is useful signal. TDD with Claude works when you keep the stages distinct.</p>";
    return;
  }
  renderQuestion();
});

renderQuestion();
</script>
<script src="../notes-widget.js"></script>
</body>
</html>
