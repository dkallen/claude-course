<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module 2: CLAUDE.md Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #fff;
            color: #1a1a1a;
            line-height: 1.6;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #666;
        }

        .level-selector {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            justify-content: center;
        }

        .level-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #ddd;
            background: #fff;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .level-btn.active {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }

        .level-btn:hover {
            border-color: #1a1a1a;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .sections {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .section-card {
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
        }

        .section-header {
            padding: 1rem;
            cursor: pointer;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafafa;
            border-bottom: 1px solid #eee;
        }

        .section-header:hover {
            background: #f5f5f5;
        }

        .section-header h2 {
            font-size: 1rem;
            font-weight: 600;
        }

        .section-description {
            font-size: 0.85rem;
            color: #666;
            margin-top: 0.25rem;
        }

        .toggle-icon {
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .toggle-icon.open {
            transform: rotate(180deg);
        }

        .section-content {
            padding: 1.5rem;
            background: #fff;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .section-content.open {
            max-height: 2000px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.9rem;
            background: #fff;
            color: #1a1a1a;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #1a1a1a;
            box-shadow: 0 0 0 2px rgba(26, 26, 26, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .checkbox-group,
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .checkbox-item,
        .radio-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        input[type="checkbox"],
        input[type="radio"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .checkbox-item label,
        .radio-item label {
            margin: 0;
            font-weight: 400;
            cursor: pointer;
        }

        .preview-section {
            position: sticky;
            top: 2rem;
        }

        .preview-header {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .preview-content {
            background: #1a1a1a;
            color: #fff;
            padding: 1.5rem;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #333;
        }

        .copy-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 0.75rem;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: #333;
        }

        .copy-btn.copied {
            background: #2d7a2d;
        }

        .helper-text {
            font-size: 0.8rem;
            color: #999;
            margin-top: 0.5rem;
        }

        .tech-input-group {
            display: flex;
            gap: 0.5rem;
        }

        .tech-input-group input {
            flex: 1;
        }

        .add-btn {
            padding: 0.75rem 1rem;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .add-btn:hover {
            background: #e0e0e0;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .tag {
            background: #e8e8e8;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tag-remove {
            cursor: pointer;
            color: #999;
            font-weight: bold;
        }

        .tag-remove:hover {
            color: #1a1a1a;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function ClaudeMdBuilder() {
            const [level, setLevel] = useState('project');
            const [expanded, setExpanded] = useState({
                identity: true,
                conventions: false,
                frameworks: false,
                style: false,
                sops: false,
                antipatterns: false
            });
            const [copied, setCopied] = useState(false);

            const [data, setData] = useState({
                projectName: '',
                projectDescription: '',
                techStack: [],
                newTech: '',
                indentation: 'spaces-4',
                namingConventions: '',
                preferredPatterns: [],
                languagePreferences: '',
                testingFramework: '',
                buildTool: '',
                lintingRules: '',
                packageManager: '',
                explainBeforeActing: true,
                askClarifyingQuestions: true,
                useConciseResponses: false,
                runTestsAfter: true,
                sops: `# Goals-Problems-Solutions-Risks-Scope (GPSR) Framework

## Goals
What are we trying to achieve?

## Problems
What obstacles or constraints exist?

## Solutions
What approaches can we take?

## Risks
What could go wrong?

## Scope
What's included and excluded?`,
                antipatterns: ''
            });

            const levelGuidance = {
                global: {
                    identity: 'Your personal preferences for how Claude should interact with you across all projects.',
                    conventions: 'How you prefer code style, naming, and patterns.',
                    frameworks: 'Your go-to tools and frameworks.',
                    style: 'How you like to receive answers and guidance.',
                    sops: 'Your standard decision-making framework.',
                    antipatterns: 'Things Claude should never do in your work.'
                },
                project: {
                    identity: 'Key project information: name, goals, and tech stack.',
                    conventions: 'Team coding standards and preferred patterns.',
                    frameworks: 'Project-specific tools and frameworks.',
                    style: 'How Claude should work with your team.',
                    sops: 'Documented processes for your project.',
                    antipatterns: 'Project-specific constraints and restrictions.'
                },
                folder: {
                    identity: 'Folder name and scope.',
                    conventions: 'Coding conventions for this specific folder.',
                    frameworks: 'Tools used in this folder.',
                    style: 'How Claude should assist with this code.',
                    sops: 'Procedures specific to this folder.',
                    antipatterns: 'What not to do in this folder.'
                }
            };

            const handleAddTech = () => {
                if (data.newTech.trim() && !data.techStack.includes(data.newTech.trim())) {
                    setData({
                        ...data,
                        techStack: [...data.techStack, data.newTech.trim()],
                        newTech: ''
                    });
                }
            };

            const handleRemoveTech = (tech) => {
                setData({
                    ...data,
                    techStack: data.techStack.filter(t => t !== tech)
                });
            };

            const toggleSection = (section) => {
                setExpanded({
                    ...expanded,
                    [section]: !expanded[section]
                });
            };

            const generatePreview = () => {
                let preview = '# CLAUDE.md\n\n';

                if (data.projectName) {
                    preview += `## Project: ${data.projectName}\n`;
                    if (data.projectDescription) {
                        preview += `${data.projectDescription}\n`;
                    }
                    preview += '\n';
                }

                if (data.techStack.length > 0 || data.indentation || data.namingConventions) {
                    preview += '## Coding Conventions\n\n';
                    if (data.indentation) {
                        preview += `**Indentation:** ${data.indentation}\n`;
                    }
                    if (data.namingConventions) {
                        preview += `**Naming:** ${data.namingConventions}\n`;
                    }
                    if (data.preferredPatterns.length > 0) {
                        preview += `**Patterns:** ${data.preferredPatterns.join(', ')}\n`;
                    }
                    if (data.languagePreferences) {
                        preview += `**Language:** ${data.languagePreferences}\n`;
                    }
                    preview += '\n';
                }

                if (data.testingFramework || data.buildTool || data.lintingRules || data.packageManager) {
                    preview += '## Frameworks & Tools\n\n';
                    if (data.testingFramework) {
                        preview += `- Testing: ${data.testingFramework}\n`;
                    }
                    if (data.buildTool) {
                        preview += `- Build: ${data.buildTool}\n`;
                    }
                    if (data.packageManager) {
                        preview += `- Package Manager: ${data.packageManager}\n`;
                    }
                    if (data.lintingRules) {
                        preview += `- Linting: ${data.lintingRules}\n`;
                    }
                    preview += '\n';
                }

                if (data.explainBeforeActing || data.askClarifyingQuestions || data.useConciseResponses || data.runTestsAfter) {
                    preview += '## Working Style\n\n';
                    if (data.explainBeforeActing) preview += '- Explain before acting\n';
                    if (data.askClarifyingQuestions) preview += '- Ask clarifying questions for ambiguous tasks\n';
                    if (data.useConciseResponses) preview += '- Use concise responses\n';
                    if (data.runTestsAfter) preview += '- Always run tests after changes\n';
                    preview += '\n';
                }

                if (data.sops) {
                    preview += '## Standard Operating Procedures\n\n';
                    preview += data.sops + '\n\n';
                }

                if (data.antipatterns) {
                    preview += '## Anti-patterns / Don\'ts\n\n';
                    preview += data.antipatterns + '\n';
                }

                return preview;
            };

            const handleCopy = async () => {
                try {
                    await navigator.clipboard.writeText(generatePreview());
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) {
                    console.error('Failed to copy:', err);
                }
            };

            const SectionCard = ({ id, title, description, children }) => (
                <div className="section-card">
                    <div
                        className="section-header"
                        onClick={() => toggleSection(id)}
                    >
                        <div>
                            <h2>{title}</h2>
                            <div className="section-description">
                                {levelGuidance[level][id] || description}
                            </div>
                        </div>
                        <div className={`toggle-icon ${expanded[id] ? 'open' : ''}`}>▼</div>
                    </div>
                    <div className={`section-content ${expanded[id] ? 'open' : ''}`}>
                        {children}
                    </div>
                </div>
            );

            return (
                <main>
                    <header>
                        <h1>Module 2: CLAUDE.md Builder</h1>
                        <p className="subtitle">From Concept to Delivery with Claude Code</p>
                    </header>

                    <div className="level-selector">
                        <button
                            className={`level-btn ${level === 'global' ? 'active' : ''}`}
                            onClick={() => setLevel('global')}
                        >
                            Building for: Global
                        </button>
                        <button
                            className={`level-btn ${level === 'project' ? 'active' : ''}`}
                            onClick={() => setLevel('project')}
                        >
                            Building for: Project
                        </button>
                        <button
                            className={`level-btn ${level === 'folder' ? 'active' : ''}`}
                            onClick={() => setLevel('folder')}
                        >
                            Building for: Folder
                        </button>
                    </div>

                    <div className="container">
                        <div className="sections">
                            <SectionCard
                                id="identity"
                                title="1. Project Identity"
                                description="Define what this is about"
                            >
                                <div className="form-group">
                                    <label>{level === 'folder' ? 'Folder Name' : 'Project Name'}</label>
                                    <input
                                        type="text"
                                        placeholder={level === 'folder' ? 'e.g., src/components' : 'e.g., Analytics Dashboard'}
                                        value={data.projectName}
                                        onChange={(e) => setData({...data, projectName: e.target.value})}
                                    />
                                </div>

                                <div className="form-group">
                                    <label>One-line Description</label>
                                    <textarea
                                        placeholder="What does this do?"
                                        value={data.projectDescription}
                                        onChange={(e) => setData({...data, projectDescription: e.target.value})}
                                    />
                                </div>

                                <div className="form-group">
                                    <label>Tech Stack</label>
                                    <div className="tech-input-group">
                                        <input
                                            type="text"
                                            placeholder="e.g., React, TypeScript, Node.js"
                                            value={data.newTech}
                                            onChange={(e) => setData({...data, newTech: e.target.value})}
                                            onKeyPress={(e) => e.key === 'Enter' && handleAddTech()}
                                        />
                                        <button className="add-btn" onClick={handleAddTech}>Add</button>
                                    </div>
                                    {data.techStack.length > 0 && (
                                        <div className="tag-list">
                                            {data.techStack.map(tech => (
                                                <div key={tech} className="tag">
                                                    {tech}
                                                    <span className="tag-remove" onClick={() => handleRemoveTech(tech)}>×</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </SectionCard>

                            <SectionCard
                                id="conventions"
                                title="2. Coding Conventions"
                                description="Style and pattern preferences"
                            >
                                <div className="form-group">
                                    <label>Indentation Style</label>
                                    <select
                                        value={data.indentation}
                                        onChange={(e) => setData({...data, indentation: e.target.value})}
                                    >
                                        <option value="">Not specified</option>
                                        <option value="spaces-2">2 spaces</option>
                                        <option value="spaces-4">4 spaces</option>
                                        <option value="tabs">Tabs</option>
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label>Naming Conventions</label>
                                    <textarea
                                        placeholder="e.g., camelCase for variables, PascalCase for classes, SCREAMING_SNAKE_CASE for constants"
                                        value={data.namingConventions}
                                        onChange={(e) => setData({...data, namingConventions: e.target.value})}
                                    />
                                </div>

                                <div className="form-group">
                                    <label>Preferred Patterns</label>
                                    <div className="checkbox-group">
                                        {['Functional components', 'Async/await', 'Arrow functions', 'Destructuring', 'Type-safe patterns'].map(pattern => (
                                            <div key={pattern} className="checkbox-item">
                                                <input
                                                    type="checkbox"
                                                    id={pattern}
                                                    checked={data.preferredPatterns.includes(pattern)}
                                                    onChange={(e) => {
                                                        if (e.target.checked) {
                                                            setData({...data, preferredPatterns: [...data.preferredPatterns, pattern]});
                                                        } else {
                                                            setData({...data, preferredPatterns: data.preferredPatterns.filter(p => p !== pattern)});
                                                        }
                                                    }}
                                                />
                                                <label htmlFor={pattern}>{pattern}</label>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="form-group">
                                    <label>Language Preferences</label>
                                    <textarea
                                        placeholder="e.g., Prefer modern JavaScript features, avoid jQuery, use ES6+ syntax"
                                        value={data.languagePreferences}
                                        onChange={(e) => setData({...data, languagePreferences: e.target.value})}
                                    />
                                </div>
                            </SectionCard>

                            <SectionCard
                                id="frameworks"
                                title="3. Frameworks & Tools"
                                description="Tooling and testing setup"
                            >
                                <div className="form-group">
                                    <label>Testing Framework</label>
                                    <input
                                        type="text"
                                        placeholder="e.g., Jest, Vitest, Mocha"
                                        value={data.testingFramework}
                                        onChange={(e) => setData({...data, testingFramework: e.target.value})}
                                    />
                                </div>

                                <div className="form-group">
                                    <label>Build Tool</label>
                                    <input
                                        type="text"
                                        placeholder="e.g., Vite, Webpack, Esbuild"
                                        value={data.buildTool}
                                        onChange={(e) => setData({...data, buildTool: e.target.value})}
                                    />
                                </div>

                                <div className="form-group">
                                    <label>Package Manager</label>
                                    <select
                                        value={data.packageManager}
                                        onChange={(e) => setData({...data, packageManager: e.target.value})}
                                    >
                                        <option value="">Not specified</option>
                                        <option value="npm">npm</option>
                                        <option value="yarn">yarn</option>
                                        <option value="pnpm">pnpm</option>
                                        <option value="bun">bun</option>
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label>Linting & Formatting Rules</label>
                                    <textarea
                                        placeholder="e.g., ESLint with Airbnb config, Prettier with 2-space indentation"
                                        value={data.lintingRules}
                                        onChange={(e) => setData({...data, lintingRules: e.target.value})}
                                    />
                                </div>
                            </SectionCard>

                            <SectionCard
                                id="style"
                                title="4. Your Working Style"
                                description="How Claude should work with you"
                            >
                                <div className="checkbox-group">
                                    <div className="checkbox-item">
                                        <input
                                            type="checkbox"
                                            id="explain"
                                            checked={data.explainBeforeActing}
                                            onChange={(e) => setData({...data, explainBeforeActing: e.target.checked})}
                                        />
                                        <label htmlFor="explain">Explain before acting</label>
                                    </div>
                                    <div className="checkbox-item">
                                        <input
                                            type="checkbox"
                                            id="clarify"
                                            checked={data.askClarifyingQuestions}
                                            onChange={(e) => setData({...data, askClarifyingQuestions: e.target.checked})}
                                        />
                                        <label htmlFor="clarify">Ask clarifying questions for ambiguous tasks</label>
                                    </div>
                                    <div className="checkbox-item">
                                        <input
                                            type="checkbox"
                                            id="concise"
                                            checked={data.useConciseResponses}
                                            onChange={(e) => setData({...data, useConciseResponses: e.target.checked})}
                                        />
                                        <label htmlFor="concise">Use concise responses</label>
                                    </div>
                                    <div className="checkbox-item">
                                        <input
                                            type="checkbox"
                                            id="tests"
                                            checked={data.runTestsAfter}
                                            onChange={(e) => setData({...data, runTestsAfter: e.target.checked})}
                                        />
                                        <label htmlFor="tests">Always run tests after changes</label>
                                    </div>
                                </div>
                            </SectionCard>

                            <SectionCard
                                id="sops"
                                title="5. Standard Operating Procedures"
                                description="Your decision-making framework"
                            >
                                <div className="form-group">
                                    <label>SOPs / Decision Framework</label>
                                    <textarea
                                        value={data.sops}
                                        onChange={(e) => setData({...data, sops: e.target.value})}
                                    />
                                    <p className="helper-text">Start with the GPSR template or describe your own process</p>
                                </div>
                            </SectionCard>

                            <SectionCard
                                id="antipatterns"
                                title="6. Anti-patterns / Don'ts"
                                description="What Claude should avoid"
                            >
                                <div className="form-group">
                                    <label>Things to Avoid</label>
                                    <textarea
                                        placeholder="e.g., Don't modify files outside src/, Don't use any/unknown types, Don't add dependencies without asking"
                                        value={data.antipatterns}
                                        onChange={(e) => setData({...data, antipatterns: e.target.value})}
                                    />
                                </div>
                            </SectionCard>
                        </div>

                        <div className="preview-section">
                            <div className="preview-header">Live Preview</div>
                            <div className="preview-content">
                                {generatePreview() || 'Fill in sections above to see preview...'}
                            </div>
                            <button
                                className={`copy-btn ${copied ? 'copied' : ''}`}
                                onClick={handleCopy}
                            >
                                {copied ? '✓ Copied to clipboard' : 'Copy to clipboard'}
                            </button>
                        </div>
                    </div>
                </main>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ClaudeMdBuilder />);
    </script>
<script src="../notes-widget.js"></script>
</body>
</html>
