<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Module 4 — Mode Chooser</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 2rem 1rem; }
  .container { max-width: 840px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 0.35rem; }
  .subtitle { color: #666; line-height: 1.6; margin-bottom: 1.5rem; }
  .grid { display: grid; gap: 1rem; grid-template-columns: 1.1fr 1fr; }
  .panel { border: 1px solid #eee; border-radius: 12px; padding: 1rem; background: #fafafa; }
  label.group { display: block; font-size: 0.84rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; font-weight: 700; margin-bottom: 0.55rem; }
  .field { margin-bottom: 1rem; }
  .field label { display: flex; gap: 0.6rem; align-items: flex-start; font-size: 0.94rem; line-height: 1.5; color: #333; }
  input[type="checkbox"] { margin-top: 0.2rem; }
  .result h2 { font-size: 0.92rem; text-transform: uppercase; letter-spacing: 0.05em; color: #777; margin-bottom: 0.4rem; }
  .badge { display: inline-block; padding: 0.3rem 0.7rem; border-radius: 999px; background: #1a1a1a; color: #fff; font-size: 0.82rem; font-weight: 600; margin-right: 0.5rem; margin-bottom: 0.7rem; }
  .warn { background: #fef2f2; color: #991b1b; border: 1px solid #f2c9c9; border-radius: 10px; padding: 0.9rem; margin-top: 0.9rem; font-size: 0.92rem; line-height: 1.55; }
  p, li { font-size: 0.92rem; line-height: 1.6; color: #444; }
  ul { padding-left: 1.3rem; margin-top: 0.5rem; }
  pre { white-space: pre-wrap; background: #fff; border: 1px solid #ececec; border-radius: 10px; padding: 1rem; font-family: 'SF Mono', SFMono-Regular, Consolas, monospace; font-size: 0.86rem; line-height: 1.55; margin-top: 0.8rem; }
  @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <h1>Mode Chooser</h1>
  <p class="subtitle">Use this to choose a reasonable starting mode for a task. It is intentionally conservative. If it recommends a narrow mode, that is usually a feature, not a limitation.</p>

  <div class="grid">
    <div class="panel">
      <label class="group">Task Traits</label>

      <div class="field">
        <label><input id="needs-edit" type="checkbox"> This task needs to edit files locally.</label>
      </div>

      <div class="field">
        <label><input id="needs-network" type="checkbox"> This task needs outbound network access.</label>
      </div>

      <div class="field">
        <label><input id="outside-workspace" type="checkbox"> This task needs to modify files outside the current workspace.</label>
      </div>

      <div class="field">
        <label><input id="unattended" type="checkbox"> I want this to run non-interactively without approval prompts.</label>
      </div>

      <div class="field">
        <label><input id="read-only" type="checkbox"> This is mostly inspection, diagnosis, or answering questions.</label>
      </div>
    </div>

    <div class="panel result">
      <h2>Recommendation</h2>
      <div id="badges"></div>
      <p id="summary"></p>
      <ul id="notes"></ul>
      <pre id="config"></pre>
      <div id="warning"></div>
    </div>
  </div>
</div>

<script>
function chooseMode() {
  const needsEdit = document.getElementById("needs-edit").checked;
  const needsNetwork = document.getElementById("needs-network").checked;
  const outsideWorkspace = document.getElementById("outside-workspace").checked;
  const unattended = document.getElementById("unattended").checked;
  const readOnly = document.getElementById("read-only").checked;

  let sandbox = "read-only";
  let approval = unattended ? "never" : "on-request";
  let summary = "Start narrow and inspect first.";
  const notes = [];
  let warning = "";

  if (needsEdit && !readOnly) {
    sandbox = "workspace-write";
    approval = unattended ? "on-request" : "on-request";
    summary = "Use workspace-write as the normal local editing mode, then widen specific boundaries only if the task proves it needs them.";
    notes.push("This lets Codex edit within the workspace without making full access the default.");
  } else {
    notes.push("Read-only is the right default when you are inspecting, diagnosing, or learning.");
  }

  if (unattended && !needsEdit && readOnly) {
    approval = "never";
    summary = "This looks like a read-only non-interactive task, so read-only with no prompts is reasonable.";
    notes.push("This matches the common quiet/CI style read-only pattern.");
  }

  if (needsNetwork) {
    notes.push("Network is a separate boundary. In practice, this often means opt-in network access or an approval prompt even in workspace-write.");
  }

  if (outsideWorkspace) {
    notes.push("If the task must modify another directory, prefer writable roots or a specific exception instead of broad full access.");
  }

  if (unattended && needsEdit) {
    warning = "Unattended editing is a higher-trust workflow. Do not jump straight to danger-full-access just to suppress prompts. Start with workspace-write and decide deliberately whether non-interactive execution is actually justified.";
  }

  if (needsNetwork && outsideWorkspace && unattended && needsEdit) {
    warning = "This combination is pushing toward a much broader trust boundary. Re-scope the task if you can. If you cannot, treat the access expansion as a deliberate operational decision, not a convenience toggle.";
  }

  const configLines = [
    `sandbox_mode = "${sandbox}"`,
    `approval_policy = "${approval}"`
  ];

  if (sandbox === "workspace-write" && needsNetwork) {
    configLines.push("");
    configLines.push("[sandbox_workspace_write]");
    configLines.push("network_access = true");
  }

  const badges = [
    `<span class="badge">sandbox: ${sandbox}</span>`,
    `<span class="badge">approval: ${approval}</span>`
  ].join("");

  document.getElementById("badges").innerHTML = badges;
  document.getElementById("summary").textContent = summary;
  document.getElementById("notes").innerHTML = notes.map((note) => `<li>${note}</li>`).join("");
  document.getElementById("config").textContent = configLines.join("\n");
  document.getElementById("warning").innerHTML = warning ? `<div class="warn">${warning}</div>` : "";
}

["needs-edit", "needs-network", "outside-workspace", "unattended", "read-only"].forEach((id) => {
  document.getElementById(id).addEventListener("change", chooseMode);
});

chooseMode();
</script>
<script src="../notes-widget.js"></script>
<script src="../feedback-widget.js"></script>
</body>
</html>
