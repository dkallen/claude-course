<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Module 3 — Scenario Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 0.35rem; }
  .subtitle { color: #666; margin-bottom: 1.5rem; }
  .card { border: 1px solid #eee; border-radius: 12px; background: #fafafa; padding: 1rem; }
  .progress { font-size: 0.85rem; color: #777; margin-bottom: 1rem; font-weight: 600; }
  .question { font-size: 1rem; line-height: 1.55; margin-bottom: 1rem; }
  .options { display: grid; gap: 0.65rem; }
  button.option { text-align: left; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font: inherit; }
  button.option:hover { border-color: #aaa; }
  .feedback { margin-top: 1rem; padding: 0.85rem; border-radius: 8px; font-size: 0.92rem; line-height: 1.55; display: none; }
  .feedback.correct { background: #f0fdf4; color: #166534; display: block; }
  .feedback.incorrect { background: #fef2f2; color: #991b1b; display: block; }
  .next { margin-top: 1rem; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 0.8rem 1rem; font: inherit; cursor: pointer; display: none; }
</style>
</head>
<body data-subject-id="openai-codex" data-module="3" data-resource-id="m3-quiz">
<div class="container">
  <h1>Module 3: Scenario Quiz</h1>
  <p class="subtitle">Test whether you can match the prompt shape to the task shape.</p>
  <div class="card">
    <div class="progress" id="progress"></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next" id="next-btn">Next</button>
  </div>
</div>
<script>
const questions = [
  {
    q: "You need Codex to rename one prop in two known files and the result is easy to verify. What is the right prompt shape?",
    options: ["Direct", "Plan-first", "A multi-page design brief", "No prompt at all"],
    answer: 0,
    explanation: "Small, obvious, easy-to-check work should stay direct."
  },
  {
    q: "You have a fuzzy idea for improving onboarding, but you are not sure whether the issue is product flow, copy, or implementation. What should you ask Codex to do first?",
    options: ["Patch the code immediately", "Plan first and challenge your assumptions", "Only rewrite strings", "Skip straight to commit preparation"],
    answer: 1,
    explanation: "When the task is ambiguous, the plan-first move is to gather context and make the problem concrete before coding."
  },
  {
    q: "Why are clarifying questions useful in agentic work?",
    options: ["They waste time but look careful", "They reduce the chance of solving the wrong problem efficiently", "They replace AGENTS.md", "They make prompts shorter"],
    answer: 1,
    explanation: "A fast answer to the wrong task is still failure. Clarifying questions are part of planning discipline."
  },
  {
    q: "What is the best role of a done-when statement?",
    options: ["To sound formal", "To define completion and make the result reviewable", "To replace tests", "To increase context size"],
    answer: 1,
    explanation: "Done-when criteria tell Codex what finished work looks like, which reduces drift and partial success."
  },
  {
    q: "A task keeps drifting beyond the requested scope. Which prompt element is most likely missing or weak?",
    options: ["A joke", "Constraints", "A longer greeting", "A different font"],
    answer: 1,
    explanation: "Constraints tell Codex what must not change and what bounds to respect."
  },
  {
    q: "Which instruction belongs in AGENTS.md instead of the current prompt?",
    options: ["Fix this bug in src/router.ts", "Use the existing test command before finishing frontend changes", "Ask one clarifying question about this PR", "Only edit these two files today"],
    answer: 1,
    explanation: "That is stable repo procedure. The others are local instructions for the current task."
  }
];

let current = 0;
let locked = false;

function renderQuestion() {
  locked = false;
  const item = questions[current];
  document.getElementById("progress").textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById("question").textContent = item.q;
  const optionsEl = document.getElementById("options");
  optionsEl.innerHTML = "";
  item.options.forEach((option, idx) => {
    const button = document.createElement("button");
    button.className = "option";
    button.textContent = option;
    button.addEventListener("click", () => answer(idx));
    optionsEl.appendChild(button);
  });
  document.getElementById("feedback").className = "feedback";
  document.getElementById("feedback").textContent = "";
  document.getElementById("next-btn").style.display = "none";
}

function answer(idx) {
  if (locked) return;
  locked = true;
  const item = questions[current];
  const feedback = document.getElementById("feedback");
  feedback.className = "feedback " + (idx === item.answer ? "correct" : "incorrect");
  feedback.textContent = item.explanation;
  document.getElementById("next-btn").style.display = "inline-block";
}

document.getElementById("next-btn").addEventListener("click", () => {
  current += 1;
  if (current >= questions.length) {
    document.querySelector(".card").innerHTML = "<h2 style='margin-bottom:0.5rem;'>Quiz complete</h2><p style='line-height:1.6;color:#444;'>Good Codex prompting is mostly operational judgment: direct when the task is sharp, plan-first when it is not, and explicit about what finished work means.</p>";
    return;
  }
  renderQuestion();
});

renderQuestion();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../supabase-client.js"></script>
<script src="../../course-notes.js"></script>
<script src="../../notes-widget.js"></script>
<script src="../../feedback-widget.js"></script>
</body>
</html>
