<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Module 2 — Flashcards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 2rem 1rem; }
  .container { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 0.35rem; }
  .subtitle { color: #666; margin-bottom: 1.5rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
  .card { perspective: 1000px; cursor: pointer; min-height: 180px; }
  .card-inner { position: relative; width: 100%; height: 100%; min-height: 180px; transition: transform 0.5s; transform-style: preserve-3d; }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .face { position: absolute; inset: 0; border: 1px solid #eee; border-radius: 12px; padding: 1rem; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.55; }
  .front { background: #fafafa; font-weight: 600; }
  .back { background: #fff; transform: rotateY(180deg); color: #444; }
</style>
</head>
<body data-subject-id="openai-codex" data-module="2" data-resource-id="m2-flashcards">
<div class="container">
  <h1>Module 2: Flashcards</h1>
  <p class="subtitle">Click any card to flip it.</p>
  <div class="grid" id="grid"></div>
</div>
<script>
const cards = [
  ["AGENTS.md", "A durable repo guidance file that teaches Codex how to work in a project."],
  ["Durable guidance", "Stable rules such as commands, conventions, review expectations, and do-not rules."],
  ["One-off guidance", "Task-specific instructions that belong in the current prompt, not in AGENTS.md."],
  ["Global file", "A personal defaults file under ~/.codex that applies broadly unless more specific guidance overrides it."],
  ["Repo-level file", "Shared project guidance that usually defines the main rules for a repository."],
  ["Nested file", "A more specific AGENTS.md inside a subdirectory that overrides broader guidance nearby."],
  ["Precedence", "More specific guidance closer to the current working directory wins."],
  ["Keep it small", "Short, accurate guidance is more useful than a long file full of vague rules."],
  ["Feedback loop", "When Codex repeats the same mistake, update AGENTS.md so the correction persists."],
  ["Done means", "A durable description of how work should be verified before it is considered complete."]
];

const grid = document.getElementById("grid");
cards.forEach(([front, back]) => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<div class="card-inner"><div class="face front">${front}</div><div class="face back">${back}</div></div>`;
  card.addEventListener("click", () => card.classList.toggle("flipped"));
  grid.appendChild(card);
});
</script>
<script src="../../notes-widget.js"></script>
<script src="../../feedback-widget.js"></script>
</body>
</html>
