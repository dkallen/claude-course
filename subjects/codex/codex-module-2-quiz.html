<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Module 2 — Scenario Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 0.35rem; }
  .subtitle { color: #666; margin-bottom: 1.5rem; }
  .card { border: 1px solid #eee; border-radius: 12px; background: #fafafa; padding: 1rem; }
  .progress { font-size: 0.85rem; color: #777; margin-bottom: 1rem; font-weight: 600; }
  .question { font-size: 1rem; line-height: 1.55; margin-bottom: 1rem; }
  .options { display: grid; gap: 0.65rem; }
  button.option { text-align: left; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font: inherit; }
  button.option:hover { border-color: #aaa; }
  .feedback { margin-top: 1rem; padding: 0.85rem; border-radius: 8px; font-size: 0.92rem; line-height: 1.55; display: none; }
  .feedback.correct { background: #f0fdf4; color: #166534; display: block; }
  .feedback.incorrect { background: #fef2f2; color: #991b1b; display: block; }
  .next { margin-top: 1rem; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 0.8rem 1rem; font: inherit; cursor: pointer; display: none; }
</style>
</head>
<body data-subject-id="openai-codex" data-module="2" data-resource-id="m2-quiz">
<div class="container">
  <h1>Module 2: Scenario Quiz</h1>
  <p class="subtitle">Test whether you can separate durable Codex guidance from one-off task instructions.</p>
  <div class="card">
    <div class="progress" id="progress"></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next" id="next-btn">Next</button>
  </div>
</div>
<script>
const questions = [
  {
    q: "You keep telling Codex on every frontend task to run `npm test` before it finishes. Where should that instruction live?",
    options: ["In each prompt forever", "In AGENTS.md as durable repo guidance", "Only in commit messages", "Nowhere"],
    answer: 1,
    explanation: "If the rule is stable across tasks, it belongs in AGENTS.md so the repo carries it automatically."
  },
  {
    q: "You are fixing one specific bug in `src/auth.ts` and want Codex to touch only that file unless it finds a blocker. Where should that instruction live?",
    options: ["In AGENTS.md", "In your one-off prompt", "In a global defaults file", "In the README only"],
    answer: 1,
    explanation: "That scope restriction is task-specific, so it belongs in the prompt rather than the durable repo guidance."
  },
  {
    q: "A global `~/.codex/AGENTS.md` says to prefer TypeScript. A repo-level `AGENTS.md` says this project is plain JavaScript. What should Codex follow in this repo?",
    options: ["The global file", "The repo-level file", "Whichever file is longer", "It should merge them into TypeScript-flavored JavaScript"],
    answer: 1,
    explanation: "More specific guidance closer to the repo wins over broader defaults."
  },
  {
    q: "Your AGENTS.md is getting long and vague. What is the real risk?",
    options: ["Codex will stop reading it entirely", "The file will exceed a fixed parser limit", "Important instructions will compete with low-value noise", "Git will reject the repository"],
    answer: 2,
    explanation: "The issue is not magic failure. It is instruction dilution: the more vague guidance you pile in, the less useful the high-value rules become."
  },
  {
    q: "Codex keeps making the same review mistake twice on a repo. What is the best response?",
    options: ["Hope it remembers next time", "Add a durable rule to AGENTS.md", "Switch tools immediately", "Repeat the same complaint in chat only"],
    answer: 1,
    explanation: "Repeated friction is exactly the signal that AGENTS.md should absorb the lesson."
  },
  {
    q: "Which of these belongs in AGENTS.md?",
    options: ["Refactor this screen today", "Use the existing `make lint` and `make test` commands before finishing work", "Review this PR against branch `release/x`", "Only touch files I mention in this message"],
    answer: 1,
    explanation: "That is stable repo procedure. The other options are temporary task directions."
  }
];

let current = 0;
let locked = false;

function renderQuestion() {
  locked = false;
  const item = questions[current];
  document.getElementById("progress").textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById("question").textContent = item.q;
  const optionsEl = document.getElementById("options");
  optionsEl.innerHTML = "";
  item.options.forEach((option, idx) => {
    const button = document.createElement("button");
    button.className = "option";
    button.textContent = option;
    button.addEventListener("click", () => answer(idx));
    optionsEl.appendChild(button);
  });
  document.getElementById("feedback").className = "feedback";
  document.getElementById("feedback").textContent = "";
  document.getElementById("next-btn").style.display = "none";
}

function answer(idx) {
  if (locked) return;
  locked = true;
  const item = questions[current];
  const feedback = document.getElementById("feedback");
  feedback.className = "feedback " + (idx === item.answer ? "correct" : "incorrect");
  feedback.textContent = item.explanation;
  document.getElementById("next-btn").style.display = "inline-block";
}

document.getElementById("next-btn").addEventListener("click", () => {
  current += 1;
  if (current >= questions.length) {
    document.querySelector(".card").innerHTML = "<h2 style='margin-bottom:0.5rem;'>Quiz complete</h2><p style='line-height:1.6;color:#444;'>If you can consistently tell repo truth from task truth, you are using AGENTS.md correctly. That distinction is the whole module.</p>";
    return;
  }
  renderQuestion();
});

renderQuestion();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../supabase-client.js"></script>
<script src="../../auth-guard.js"></script>
<script src="../../auth-account.js"></script>
<script src="../../course-notes.js"></script>
<script src="../../notes-widget.js"></script>
<script src="../../feedback-widget.js"></script>
<script src="../../version.js"></script>
</body>
</html>
