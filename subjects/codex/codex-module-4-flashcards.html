<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Module 4 — Flashcards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 2rem 1rem; }
  .container { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 0.35rem; }
  .subtitle { color: #666; margin-bottom: 1.5rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
  .card { perspective: 1000px; cursor: pointer; min-height: 180px; }
  .card-inner { position: relative; width: 100%; height: 100%; min-height: 180px; transition: transform 0.5s; transform-style: preserve-3d; }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .face { position: absolute; inset: 0; border: 1px solid #eee; border-radius: 12px; padding: 1rem; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.55; }
  .front { background: #fafafa; font-weight: 600; }
  .back { background: #fff; transform: rotateY(180deg); color: #444; }
</style>
</head>
<body data-subject-id="openai-codex" data-module="4" data-resource-id="m4-flashcards">
<div class="container">
  <h1>Module 4: Flashcards</h1>
  <p class="subtitle">Click any card to flip it.</p>
  <div class="grid" id="grid"></div>
</div>
<script>
const cards = [
  ["Sandboxing", "The technical boundary that limits what Codex can do autonomously."],
  ["Approval policy", "The rule that decides when Codex must stop and ask for approval."],
  ["read-only", "Inspect files and answer questions, but do not edit or run broader commands without approval."],
  ["workspace-write", "The normal low-friction local mode for editing within the workspace."],
  ["danger-full-access", "No sandbox boundary. Use only intentionally."],
  ["untrusted", "Ask before running commands outside the trusted set."],
  ["on-request", "Work inside the sandbox normally and ask when the task crosses the boundary."],
  ["never", "Do not stop for approval prompts."],
  ["full-auto", "A preset for workspace-write plus on-request."],
  ["Full access", "danger-full-access plus never."],
  ["Writable roots", "Specific extra directories Codex may modify without removing the sandbox entirely."],
  ["/permissions", "CLI command for changing permissions mode during a session."]
];

const grid = document.getElementById("grid");
cards.forEach(([front, back]) => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<div class="card-inner"><div class="face front">${front}</div><div class="face back">${back}</div></div>`;
  card.addEventListener("click", () => card.classList.toggle("flipped"));
  grid.appendChild(card);
});
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../supabase-client.js"></script>
<script src="../../auth-guard.js"></script>
<script src="../../auth-account.js"></script>
<script src="../../course-notes.js"></script>
<script src="../../notes-widget.js"></script>
<script src="../../feedback-widget.js"></script>
<script src="../../version.js"></script>
</body>
</html>
