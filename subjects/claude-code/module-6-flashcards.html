<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 6 — Flashcards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 2rem 1rem; }
  .container { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 0.35rem; }
  .subtitle { color: #666; margin-bottom: 1.5rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
  .card { perspective: 1000px; cursor: pointer; min-height: 180px; }
  .card-inner { position: relative; width: 100%; height: 100%; min-height: 180px; transition: transform 0.5s; transform-style: preserve-3d; }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .face { position: absolute; inset: 0; border: 1px solid #eee; border-radius: 12px; padding: 1rem; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.55; }
  .front { background: #fafafa; font-weight: 600; }
  .back { background: #fff; transform: rotateY(180deg); color: #444; }
</style>
</head>
<body data-subject-id="claude-code" data-module="6" data-resource-id="m6-flashcards">
<div class="container">
  <h1>Module 6: Flashcards</h1>
  <p class="subtitle">Click any card to flip it.</p>
  <div class="grid" id="grid"></div>
</div>
<script>
const cards = [
  ["Red", "Write a test that fails for the right reason before implementation exists."],
  ["Green", "Implement the smallest coherent change that makes the tests pass."],
  ["Refactor", "Improve structure only after behavior is protected by passing tests."],
  ["Executable spec", "Tests that define the target behavior in a form the code must satisfy."],
  ["Implementation-shaped test", "A test that mirrors internals instead of validating behavior."],
  ["Trivial pass", "A test that passes even though the feature is missing or the behavior is wrong."],
  ["Boundary case", "An edge condition that often reveals whether the specification is real."],
  ["Unit test", "Best when the main risk is isolated logic."],
  ["Integration test", "Best when the main risk is how parts work together."],
  ["Stage collapse", "When test generation, implementation, and cleanup are bundled together and the red signal disappears."]
];

const grid = document.getElementById("grid");
cards.forEach(([front, back]) => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<div class="card-inner"><div class="face front">${front}</div><div class="face back">${back}</div></div>`;
  card.addEventListener("click", () => card.classList.toggle("flipped"));
  grid.appendChild(card);
});
</script>
<script src="../../notes-widget.js"></script>
<script src="../../feedback-widget.js"></script>
</body>
</html>
