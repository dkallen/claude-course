<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 3 — Prompt Calibrator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 2rem 1rem; }
  .container { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 0.35rem; }
  .subtitle { color: #666; line-height: 1.6; margin-bottom: 1.5rem; }
  .panel { border: 1px solid #eee; border-radius: 12px; padding: 1rem; background: #fafafa; margin-bottom: 1rem; }
  label { display: block; font-size: 0.84rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; font-weight: 700; margin-bottom: 0.35rem; }
  select, textarea, input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 0.75rem; font: inherit; margin-bottom: 1rem; background: #fff; }
  textarea { min-height: 100px; resize: vertical; }
  button { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 0.8rem 1rem; font: inherit; cursor: pointer; }
  pre { white-space: pre-wrap; background: #fff; border: 1px solid #ececec; border-radius: 10px; padding: 1rem; font-family: 'SF Mono', SFMono-Regular, Consolas, monospace; font-size: 0.86rem; line-height: 1.55; }
</style>
</head>
<body data-subject-id="claude-code" data-module="3" data-resource-id="m3-calibrator">
<div class="container">
  <h1>Prompt Calibrator</h1>
  <p class="subtitle">Use this to turn a fuzzy task into a stronger prompt. The output is not a magic formula. It is a better default shape.</p>

  <div class="panel">
    <label for="task-type">Task Type</label>
    <select id="task-type">
      <option value="explore">Explore / diagnose</option>
      <option value="execute">Execute a clear change</option>
      <option value="review">Review or critique</option>
    </select>

    <label for="goal">Goal</label>
    <textarea id="goal">Clean up the signup validation so it is easier to reason about.</textarea>

    <label for="context">Context</label>
    <textarea id="context">The current validation logic is spread across multiple files. Use existing patterns in the repo.</textarea>

    <label for="constraints">Constraints</label>
    <textarea id="constraints">Do not redesign the UI. Do not add new dependencies. Keep the change narrow.</textarea>

    <label for="done-when">Done When</label>
    <textarea id="done-when">Validation rules live in one place, affected tests pass, and the diff is easy to review.</textarea>

    <button id="build-btn" type="button">Build Prompt</button>
  </div>

  <div class="panel">
    <label>Suggested Prompt</label>
    <pre id="output"></pre>
  </div>
</div>

<script>
  const presets = {
    explore: "Start by inspecting the relevant files and identifying what is actually going wrong before proposing changes.",
    execute: "Implement the smallest coherent change that achieves the goal within the stated constraints.",
    review: "Review the current approach critically and call out bugs, risks, regressions, and missing verification before suggesting broader cleanup."
  };

  function buildPrompt() {
    const taskType = document.getElementById("task-type").value;
    const goal = document.getElementById("goal").value.trim();
    const context = document.getElementById("context").value.trim();
    const constraints = document.getElementById("constraints").value.trim();
    const doneWhen = document.getElementById("done-when").value.trim();

    const prompt = [
      goal,
      "",
      "Approach:",
      "- " + presets[taskType],
      "",
      "Context:",
      context,
      "",
      "Constraints:",
      constraints,
      "",
      "Done when:",
      doneWhen
    ].join("\n");

    document.getElementById("output").textContent = prompt;
  }

  document.getElementById("build-btn").addEventListener("click", buildPrompt);
  buildPrompt();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../supabase-client.js"></script>
<script src="../../course-notes.js"></script>
<script src="../../notes-widget.js"></script>
<script src="../../feedback-widget.js"></script>
</body>
</html>
