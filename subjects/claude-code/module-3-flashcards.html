<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 3 — Flashcards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 2rem 1rem; }
  .container { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 0.35rem; }
  .subtitle { color: #666; margin-bottom: 1.5rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
  .card { perspective: 1000px; cursor: pointer; min-height: 180px; }
  .card-inner { position: relative; width: 100%; height: 100%; min-height: 180px; transition: transform 0.5s; transform-style: preserve-3d; }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .face { position: absolute; inset: 0; border: 1px solid #eee; border-radius: 12px; padding: 1rem; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.55; }
  .front { background: #fafafa; font-weight: 600; }
  .back { background: #fff; transform: rotateY(180deg); color: #444; }
</style>
</head>
<body>
<div class="container">
  <h1>Module 3: Flashcards</h1>
  <p class="subtitle">Click any card to flip it.</p>
  <div class="grid" id="grid"></div>
</div>
<script>
const cards = [
  ["Loose prompt", "Best for exploration, diagnosis, and open-ended thinking."],
  ["Tight prompt", "Best for execution when success criteria and boundaries are already clear."],
  ["Director Mode", "Describe the destination and constraints without micromanaging each implementation step."],
  ["Goal", "What you are trying to change or build."],
  ["Context", "The files, examples, errors, or surrounding facts Claude needs to reason well."],
  ["Constraints", "The things Claude must preserve, avoid, or respect while doing the work."],
  ["Done when", "The conditions that define finished work."],
  ["Anti-example", "An explicit statement of what bad output or bad behavior to avoid."],
  ["Scope drift", "When Claude solves more than you asked for or solves a neighboring problem instead."],
  ["Effort calibration", "Match the thinking budget to the task instead of always asking for maximum reasoning."],
  ["Exploration prompt", "Useful when the shape of the problem is still unclear."],
  ["Execution prompt", "Useful when you care about precision, verification, and reviewability."]
];

const grid = document.getElementById("grid");
cards.forEach(([front, back]) => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<div class="card-inner"><div class="face front">${front}</div><div class="face back">${back}</div></div>`;
  card.addEventListener("click", () => card.classList.toggle("flipped"));
  grid.appendChild(card);
});
</script>
<script src="../../notes-widget.js"></script>
<script src="../../feedback-widget.js"></script>
</body>
</html>
