<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 2 — Scenario Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 0.35rem; }
  .subtitle { color: #666; margin-bottom: 1.5rem; }
  .card { border: 1px solid #eee; border-radius: 12px; background: #fafafa; padding: 1rem; }
  .progress { font-size: 0.85rem; color: #777; margin-bottom: 1rem; font-weight: 600; }
  .scenario-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #bbb; margin-bottom: 0.4rem; }
  .scenario { background: #f4f4f4; border: 1px solid #e8e8e8; border-radius: 8px; padding: 0.85rem; font-size: 0.9rem; line-height: 1.6; color: #444; margin-bottom: 1rem; }
  .question { font-size: 1rem; font-weight: 600; line-height: 1.5; margin-bottom: 1rem; }
  .options { display: grid; gap: 0.65rem; }
  button.option { text-align: left; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font: inherit; font-size: 0.9rem; line-height: 1.5; }
  button.option:hover { border-color: #aaa; }
  .feedback { margin-top: 1rem; padding: 0.85rem; border-radius: 8px; font-size: 0.92rem; line-height: 1.55; display: none; }
  .feedback.correct { background: #f0fdf4; color: #166534; display: block; }
  .feedback.incorrect { background: #fef2f2; color: #991b1b; display: block; }
  .next { margin-top: 1rem; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 0.8rem 1rem; font: inherit; cursor: pointer; display: none; }
</style>
</head>
<body data-subject-id="claude-code" data-module="2" data-resource-id="m2-quiz">
<div class="container">
  <h1>Module 2: Scenario Quiz</h1>
  <p class="subtitle">CLAUDE.md — the decisions that persist.</p>
  <div class="card">
    <div class="progress" id="progress"></div>
    <div class="scenario-label" id="scenario-label" style="display:none">Scenario</div>
    <div class="scenario" id="scenario" style="display:none"></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next" id="next-btn">Next</button>
  </div>
</div>
<script>
const questions = [
  {
    scenario: "You're writing your first CLAUDE.md. You include your preferred coding style, the project's tech stack, testing conventions — and a detailed walkthrough of the feature you're about to build this session.",
    q: "What's wrong with this CLAUDE.md?",
    options: [
      "The feature walkthrough doesn't belong — CLAUDE.md is for persistent conventions, not session-specific tasks. Put the feature details in your prompt instead.",
      "Tech stack information doesn't belong — CLAUDE.md should focus on style conventions, not stack choices.",
      "Nothing is wrong — the more context Claude has upfront, the more accurate its work will be.",
      "The file is too short — CLAUDE.md should cover every possible edge case and convention."
    ],
    answer: 0,
    explanation: "CLAUDE.md should contain conventions, patterns, and rules that apply across your entire project — not one-time instructions for a specific feature. Session-specific details belong in your prompt for that session. If you put them in CLAUDE.md, they'll clutter every future session and the feature context will quickly become stale."
  },
  {
    scenario: "You have a global CLAUDE.md at ~/.claude/CLAUDE.md that says 'Always use TypeScript.' Your project CLAUDE.md says 'This project uses JavaScript.' You ask Claude to create a new utility function.",
    q: "What language will Claude use?",
    options: [
      "TypeScript — global instructions establish the baseline and project files can only add to them, not override them.",
      "JavaScript — project-level instructions override global ones for that project context.",
      "Claude will ask you which language to use, since the instructions conflict.",
      "It depends on the file extension of the file currently open in the editor."
    ],
    answer: 1,
    explanation: "Project-level CLAUDE.md files take precedence over global ones. When both exist, the closer (more specific) file wins. This allows teams to override personal preferences with project conventions — exactly the right behavior when joining a project that uses a different stack than your default."
  },
  {
    scenario: "Your CLAUDE.md is 500 lines long — every convention, edge case, and preference you can think of. Claude follows some rules consistently but ignores others seemingly at random.",
    q: "What's most likely the issue?",
    options: [
      "Claude has a hard 500-line limit on CLAUDE.md files and is truncating the rest.",
      "The file has contradictory rules, and Claude is arbitrarily choosing between them.",
      "The CLAUDE.md is too long — important conventions get diluted in the noise. Claude processes it like any other context.",
      "CLAUDE.md rules are advisory, not enforced — Claude always uses its own judgment over file instructions."
    ],
    answer: 2,
    explanation: "While there's no hard line limit, an overly long CLAUDE.md suffers from context dilution — important rules get buried in noise. Focus on the 20–30 conventions that matter most and express them clearly. A concise, coherent file outperforms an exhaustive one."
  },
  {
    scenario: "You add to your CLAUDE.md: 'When analyzing any new idea or feature request, apply this framework: start with Goals, identify Problems, propose Solutions, assess Risks, define Scope.' You then say: 'I'm thinking about adding a dark mode feature.'",
    q: "What should you expect?",
    options: [
      "Claude should apply the framework automatically — starting with goals for dark mode, identifying problems, etc. — without you having to ask for it explicitly.",
      "Claude will apply the framework only if you explicitly say 'use the framework from CLAUDE.md' in your message.",
      "Claude will ask you to confirm which framework you want before proceeding.",
      "Claude will apply the framework to coding tasks but not to product discussions, since the instruction lacks that context."
    ],
    answer: 0,
    explanation: "CLAUDE.md defines persistent behaviors, including thinking frameworks. When you define a framework for analyzing ideas, Claude applies it to relevant requests automatically — that's the point of persistent conventions. You don't have to re-invoke it in every message."
  },
  {
    scenario: "Your CLAUDE.md contains two rules: 'Always write tests for new functions' and 'Move fast — skip anything that isn't strictly necessary for the feature to work.'",
    q: "What will likely happen?",
    options: [
      "Claude will always write tests — explicit rules override implicit speed preferences.",
      "Claude will always skip tests — the second rule is more recent and takes precedence.",
      "Claude will be inconsistent — sometimes writing tests, sometimes not — because the rules contradict each other.",
      "Claude will flag the contradiction and ask you to resolve it before proceeding."
    ],
    answer: 2,
    explanation: "Contradictory instructions produce inconsistent behavior. Claude will try to satisfy both, which means it will sometimes favor one and sometimes the other depending on how it parses the request. Resolve it by making priority explicit: 'Write tests for production functions; skip for quick experiments' removes the ambiguity."
  },
  {
    scenario: "You're working on a monorepo with a React frontend and a Python backend. You want different conventions for each part.",
    q: "What's the best CLAUDE.md setup?",
    options: [
      "One root CLAUDE.md with all conventions for both parts, clearly labeled with headers for each.",
      "One project-root CLAUDE.md for shared conventions, plus folder-level CLAUDE.md files in frontend/ and backend/ for their specific rules.",
      "Put everything in the global ~/.claude/CLAUDE.md so conventions are consistent across all your projects.",
      "Two separate Claude Code projects — monorepos don't work well with a single CLAUDE.md."
    ],
    answer: 1,
    explanation: "The hierarchy works: root CLAUDE.md carries shared conventions (code style, testing approach, git workflow), while folder-level files carry tech-specific rules that override as needed. Claude reads the most specific file first and inherits from parents. This keeps shared rules DRY while allowing each part of the repo to have its own conventions."
  },
  {
    scenario: "You've used CLAUDE.md successfully for a week. A new teammate asks: 'Do I need to install a plugin or configure anything to get CLAUDE.md working?'",
    q: "What do you tell them?",
    options: [
      "They need to copy the file to their ~/.claude/ directory so it applies to their Claude Code sessions.",
      "They need to enable CLAUDE.md support in Claude Code settings — it's off by default for new installations.",
      "No setup needed — Claude Code reads CLAUDE.md automatically from the project. Just make sure it's committed to the repo.",
      "They need to reference the file explicitly in their first prompt of each session."
    ],
    answer: 2,
    explanation: "CLAUDE.md is automatic — no installation, plugin, or explicit invocation needed. Claude Code looks for CLAUDE.md files when you're in a project directory and applies them transparently. Committing the file to your repo ensures the whole team benefits without any per-person configuration."
  },
  {
    scenario: "Claude keeps using console.log for debugging in your codebase, but your team uses a structured logging utility instead.",
    q: "Where's the best place to put the rule: 'Never use console.log — use the project logging utility at src/lib/logger.ts'?",
    options: [
      "In your global ~/.claude/CLAUDE.md, so it applies across all your projects.",
      "In the project CLAUDE.md — this is a project-level convention that should apply to everyone on the team.",
      "In your prompt each session, so it stays fresh in Claude's context.",
      "In a separate .claude-rules file — CLAUDE.md should be reserved for architecture and style conventions."
    ],
    answer: 1,
    explanation: "Project conventions belong in the project CLAUDE.md. This is exactly the use case: a team-wide rule that should persist across all sessions and apply to everyone. Putting it in the global file would pollute your other projects; re-stating it in every prompt is tedious and easy to forget."
  }
];

let current = 0;
let locked = false;

function renderQuestion() {
  locked = false;
  const item = questions[current];
  document.getElementById("progress").textContent = `Question ${current + 1} of ${questions.length}`;

  const scenarioEl = document.getElementById("scenario");
  const scenarioLabel = document.getElementById("scenario-label");
  if (item.scenario) {
    scenarioEl.textContent = item.scenario;
    scenarioEl.style.display = "block";
    scenarioLabel.style.display = "block";
  } else {
    scenarioEl.style.display = "none";
    scenarioLabel.style.display = "none";
  }

  document.getElementById("question").textContent = item.q;
  const optionsEl = document.getElementById("options");
  optionsEl.innerHTML = "";
  item.options.forEach((option, idx) => {
    const button = document.createElement("button");
    button.className = "option";
    button.textContent = option;
    button.addEventListener("click", () => answer(idx));
    optionsEl.appendChild(button);
  });
  document.getElementById("feedback").className = "feedback";
  document.getElementById("feedback").textContent = "";
  document.getElementById("next-btn").style.display = "none";
}

function answer(idx) {
  if (locked) return;
  locked = true;
  const item = questions[current];
  const feedback = document.getElementById("feedback");
  feedback.className = "feedback " + (idx === item.answer ? "correct" : "incorrect");
  feedback.textContent = item.explanation;
  document.getElementById("next-btn").style.display = "inline-block";
}

document.getElementById("next-btn").addEventListener("click", () => {
  current += 1;
  if (current >= questions.length) {
    document.querySelector(".card").innerHTML = "<h2 style='margin-bottom:0.5rem;'>Quiz complete</h2><p style='line-height:1.6;color:#444;'>The most common mistakes here involve hierarchy and scope — when to use global vs project vs folder level, and what belongs in CLAUDE.md vs a prompt. If those tripped you up, re-read the lesson.</p>";
    return;
  }
  renderQuestion();
});

renderQuestion();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../supabase-client.js"></script>
<script src="../../auth-guard.js"></script>
<script src="../../auth-account.js"></script>
<script src="../../course-notes.js"></script>
<script src="../../notes-widget.js"></script>
<script src="../../feedback-widget.js"></script>
<script src="../../version.js"></script>
</body>
</html>
