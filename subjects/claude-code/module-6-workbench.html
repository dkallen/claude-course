<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 6 — Spec-to-Tests Workbench</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 2rem 1rem; }
  .container { max-width: 820px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 0.35rem; }
  .subtitle { color: #666; line-height: 1.6; margin-bottom: 1.5rem; }
  .panel { border: 1px solid #eee; border-radius: 12px; padding: 1rem; background: #fafafa; margin-bottom: 1rem; }
  label { display: block; font-size: 0.84rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; font-weight: 700; margin-bottom: 0.35rem; }
  textarea, select, input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 0.75rem; font: inherit; margin-bottom: 1rem; background: #fff; }
  textarea { min-height: 92px; resize: vertical; }
  button { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 0.8rem 1rem; font: inherit; cursor: pointer; }
  .output-grid { display: grid; gap: 1rem; }
  pre { white-space: pre-wrap; background: #fff; border: 1px solid #ececec; border-radius: 10px; padding: 1rem; font-family: 'SF Mono', SFMono-Regular, Consolas, monospace; font-size: 0.86rem; line-height: 1.55; }
</style>
</head>
<body data-subject-id="claude-code" data-module="6" data-resource-id="m6-workbench">
<div class="container">
  <h1>Spec-to-Tests Workbench</h1>
  <p class="subtitle">Turn plain-English behavior into a usable TDD starting point before you ask Claude to implement anything.</p>

  <div class="panel">
    <label for="requirement">Requirement</label>
    <textarea id="requirement">When a learner marks a module complete, the course should save the progress and show that status after the page reloads.</textarea>

    <label for="happy-path">Core Behavior</label>
    <textarea id="happy-path">Completion state is stored and correctly restored on reload for the same subject and module.</textarea>

    <label for="boundary-case">Boundary / Edge Case</label>
    <textarea id="boundary-case">Progress for one subject should not overwrite progress for a different subject.</textarea>

    <label for="test-level">Best First Test Level</label>
    <select id="test-level">
      <option value="unit">Unit</option>
      <option value="integration" selected>Integration</option>
      <option value="both">Both</option>
    </select>

    <label for="avoid">Do Not Test</label>
    <input id="avoid" value="private helper implementation details or cosmetic DOM changes">

    <button id="build-btn" type="button">Build TDD Plan</button>
  </div>

  <div class="output-grid">
    <div class="panel">
      <label>Behavior Spec</label>
      <pre id="spec-output"></pre>
    </div>
    <div class="panel">
      <label>Suggested Test Sequence</label>
      <pre id="tests-output"></pre>
    </div>
    <div class="panel">
      <label>Claude Prompt</label>
      <pre id="prompt-output"></pre>
    </div>
  </div>
</div>

<script>
  function buildPlan() {
    const requirement = document.getElementById("requirement").value.trim();
    const happyPath = document.getElementById("happy-path").value.trim();
    const boundaryCase = document.getElementById("boundary-case").value.trim();
    const testLevel = document.getElementById("test-level").value;
    const avoid = document.getElementById("avoid").value.trim();

    const spec = [
      "Behavior contract:",
      "- Requirement: " + requirement,
      "- Core behavior: " + happyPath,
      "- Edge case: " + boundaryCase,
      "- First test level: " + testLevel,
      "- Do not couple tests to: " + avoid
    ].join("\n");

    const tests = [
      "1. Write one failing test for the main behavior.",
      "2. Write one failing test for the edge case.",
      "3. Confirm both tests fail for the intended reason.",
      "4. Implement the smallest change to go green.",
      "5. Refactor only after both tests pass.",
      "",
      "Review questions:",
      "- Would these tests still fail if the feature did not exist?",
      "- Are the assertions about behavior instead of implementation detail?",
      "- Is the edge case protecting a real risk?"
    ].join("\n");

    const prompt = [
      "Use a test-first workflow for this change.",
      "",
      "Requirement:",
      requirement,
      "",
      "Core behavior:",
      happyPath,
      "",
      "Edge case:",
      boundaryCase,
      "",
      "Start by writing tests only. Do not implement the feature yet.",
      "The first test level should be: " + testLevel + ".",
      "Avoid testing: " + avoid + ".",
      "",
      "Done when:",
      "- the initial tests fail for the right reason",
      "- the smallest implementation makes them pass",
      "- the final diff is still easy to review"
    ].join("\n");

    document.getElementById("spec-output").textContent = spec;
    document.getElementById("tests-output").textContent = tests;
    document.getElementById("prompt-output").textContent = prompt;
  }

  document.getElementById("build-btn").addEventListener("click", buildPlan);
  buildPlan();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../supabase-client.js"></script>
<script src="../../auth-guard.js"></script>
<script src="../../auth-account.js"></script>
<script src="../../course-notes.js"></script>
<script src="../../notes-widget.js"></script>
<script src="../../feedback-widget.js"></script>
<script src="../../version.js"></script>
</body>
</html>
