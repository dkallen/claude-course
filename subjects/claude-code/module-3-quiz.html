<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 3 — Scenario Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 0.35rem; }
  .subtitle { color: #666; margin-bottom: 1.5rem; }
  .card { border: 1px solid #eee; border-radius: 12px; background: #fafafa; padding: 1rem; }
  .progress { font-size: 0.85rem; color: #777; margin-bottom: 1rem; font-weight: 600; }
  .question { font-size: 1rem; line-height: 1.55; margin-bottom: 1rem; }
  .options { display: grid; gap: 0.65rem; }
  button.option { text-align: left; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font: inherit; }
  button.option:hover { border-color: #aaa; }
  .feedback { margin-top: 1rem; padding: 0.85rem; border-radius: 8px; font-size: 0.92rem; line-height: 1.55; display: none; }
  .feedback.correct { background: #f0fdf4; color: #166534; display: block; }
  .feedback.incorrect { background: #fef2f2; color: #991b1b; display: block; }
  .next { margin-top: 1rem; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 0.8rem 1rem; font: inherit; cursor: pointer; display: none; }
</style>
</head>
<body data-subject-id="claude-code" data-module="3" data-resource-id="m3-quiz">
<div class="container">
  <h1>Module 3: Scenario Quiz</h1>
  <p class="subtitle">Test your prompt judgment, not just your memory.</p>
  <div class="card">
    <div class="progress" id="progress"></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next" id="next-btn">Next</button>
  </div>
</div>
<script>
const questions = [
  {
    q: "You are investigating a vague product bug and aren't yet sure whether the issue is in the frontend, backend, or the prompt used to generate content. What prompt style is best first?",
    options: ["A loose exploratory prompt", "A rigid implementation checklist", "An immediate rewrite request", "A test-only prompt"],
    answer: 0,
    explanation: "Early diagnosis benefits from exploration. You want Claude to inspect, hypothesize, and help define the problem before you narrow scope."
  },
  {
    q: "You already know the exact bug, the affected files, and the expected behavior. What is most important to add now?",
    options: ["More vague background", "Constraints and done-when criteria", "A personal story about the bug", "No prompt at all"],
    answer: 1,
    explanation: "Once the task is clear, precision matters more than narrative. Constraints and success criteria reduce drift and improve reviewability."
  },
  {
    q: "What is the strongest use of Director Mode?",
    options: ["Telling Claude every keystroke to make", "Describing the outcome and boundaries while leaving room for implementation judgment", "Refusing to provide any context", "Only asking yes/no questions"],
    answer: 1,
    explanation: "Director Mode is outcome-first prompting. You direct the result, not every individual move."
  },
  {
    q: "Why are anti-examples useful?",
    options: ["They make the prompt longer for its own sake", "They tell Claude what bad output looks like or what to avoid", "They replace success criteria", "They raise the model's intelligence"],
    answer: 1,
    explanation: "Anti-examples prevent common misunderstandings by making failure modes explicit."
  },
  {
    q: "When is a loose prompt most risky?",
    options: ["When you are exploring design options", "When the task is high-stakes and you already know what done looks like", "When you are brainstorming names", "When you want alternative approaches"],
    answer: 1,
    explanation: "High-stakes execution work needs tighter framing. Otherwise Claude may solve the wrong problem plausibly."
  },
  {
    q: "What problem does the 'done when' section solve?",
    options: ["It makes prompts sound more professional", "It reduces ambiguity about what counts as finished work", "It removes the need for testing", "It replaces constraints"],
    answer: 1,
    explanation: "Without a finish line, Claude often produces something plausible but incomplete."
  },
  {
    q: "A trivial rename across three files is taking too long because you asked Claude to think extremely hard. What likely happened?",
    options: ["The task needed even more reasoning", "The prompt was too loose", "The thinking budget was mismatched to the task", "Claude cannot rename files"],
    answer: 2,
    explanation: "Not every task needs high effort. Overthinking routine work can slow execution without improving quality."
  },
  {
    q: "What is the best default prompt structure for tighter execution work?",
    options: ["Question, joke, anecdote, command", "Goal, context, constraints, done when", "Command, apology, summary", "Only examples"],
    answer: 1,
    explanation: "That four-part structure is a practical default because it balances clarity with flexibility."
  }
];

let current = 0;
let locked = false;

function renderQuestion() {
  locked = false;
  const item = questions[current];
  document.getElementById("progress").textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById("question").textContent = item.q;
  const optionsEl = document.getElementById("options");
  optionsEl.innerHTML = "";
  item.options.forEach((option, idx) => {
    const button = document.createElement("button");
    button.className = "option";
    button.textContent = option;
    button.addEventListener("click", () => answer(idx));
    optionsEl.appendChild(button);
  });
  document.getElementById("feedback").className = "feedback";
  document.getElementById("feedback").textContent = "";
  document.getElementById("next-btn").style.display = "none";
}

function answer(idx) {
  if (locked) return;
  locked = true;
  const item = questions[current];
  const feedback = document.getElementById("feedback");
  feedback.className = "feedback " + (idx === item.answer ? "correct" : "incorrect");
  feedback.textContent = item.explanation;
  document.getElementById("next-btn").style.display = "inline-block";
}

document.getElementById("next-btn").addEventListener("click", () => {
  current += 1;
  if (current >= questions.length) {
    document.querySelector(".card").innerHTML = "<h2 style='margin-bottom:0.5rem;'>Quiz complete</h2><p style='line-height:1.6;color:#444;'>If the patterns in your mistakes feel familiar, that is the point. Prompt quality is mostly about calibration, not memorizing slogans.</p>";
    return;
  }
  renderQuestion();
});

renderQuestion();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../supabase-client.js"></script>
<script src="../../course-notes.js"></script>
<script src="../../notes-widget.js"></script>
<script src="../../feedback-widget.js"></script>
</body>
</html>
