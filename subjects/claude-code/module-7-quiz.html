<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 7 — Scenario Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 0.35rem; }
  .subtitle { color: #666; margin-bottom: 1.5rem; }
  .card { border: 1px solid #eee; border-radius: 12px; background: #fafafa; padding: 1rem; }
  .progress { font-size: 0.85rem; color: #777; margin-bottom: 1rem; font-weight: 600; }
  .question { font-size: 1rem; line-height: 1.55; margin-bottom: 1rem; }
  .options { display: grid; gap: 0.65rem; }
  button.option { text-align: left; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font: inherit; font-size: 0.92rem; line-height: 1.5; }
  button.option:hover { border-color: #aaa; }
  .feedback { margin-top: 1rem; padding: 0.85rem; border-radius: 8px; font-size: 0.92rem; line-height: 1.55; display: none; }
  .feedback.correct { background: #f0fdf4; color: #166534; display: block; }
  .feedback.incorrect { background: #fef2f2; color: #991b1b; display: block; }
  .next { margin-top: 1rem; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 0.8rem 1rem; font: inherit; cursor: pointer; display: none; }
</style>
</head>
<body data-subject-id="claude-code" data-module="7" data-resource-id="m7-quiz">
<div class="container">
  <h1>Module 7: Scenario Quiz</h1>
  <p class="subtitle">Test whether you can make the right calls about skill design, placement, and testing.</p>
  <div class="card">
    <div class="progress" id="progress"></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next" id="next-btn">Next</button>
  </div>
</div>
<script>
const questions = [
  {
    q: "You create a skill called review.md in .claude/commands/. A teammate clones the repo. Can they use /review?",
    options: [
      "No — skills in .claude/commands/ only work for the person who created them",
      "Yes — project-level skills in .claude/commands/ are version-controlled and available to everyone working in that repo",
      "Only if they copy the file to their ~/.claude/commands/ directory",
      "Only if Claude Code is configured to share skills between users"
    ],
    answer: 1,
    explanation: "Project-level skills in .claude/commands/ are part of the repository. When your teammate clones it, they get the skill automatically — no additional setup needed."
  },
  {
    q: "You have a skill that writes PR descriptions. You want to invoke it for PR #247 specifically. The skill file currently has no $ARGUMENTS. What's the best move?",
    options: [
      "Create a separate skill for each PR number",
      "Add $ARGUMENTS to the skill file and invoke it as /pr-description 247",
      "Write the PR number in the instruction body and change it each time",
      "Use two separate skills: one for the description, one to pass the number"
    ],
    answer: 1,
    explanation: "$ARGUMENTS is designed exactly for this: passing variable input to a fixed instruction. The skill stays generic; the specific context comes from the invocation."
  },
  {
    q: "A skill you wrote for code review works perfectly on Python files but gives inconsistent results on JavaScript files. What's the most likely cause?",
    options: [
      "JavaScript files are too large for Claude Code to handle",
      "The skill is project-level when it should be user-level",
      "The instruction body was written with Python patterns in mind and doesn't generalize",
      "$ARGUMENTS is missing from the skill file"
    ],
    answer: 2,
    explanation: "Skills produce inconsistent results when the instruction body was written for a specific case and doesn't hold up when the context changes. The fix is usually to make the instruction more explicit about what should happen regardless of the language."
  },
  {
    q: "You want a skill that writes commit messages your way — specific formatting, a specific tone — and you want it available on every project you work on. Where should the file go?",
    options: [
      ".claude/commands/ in each project you work on",
      "~/.claude/commands/ — user-level, available everywhere",
      "Anywhere in the repository root",
      "Inside the .git directory"
    ],
    answer: 1,
    explanation: "User-level skills in ~/.claude/commands/ apply across every project. Project-level skills are for knowledge specific to one codebase."
  },
  {
    q: "A skill has a clear description, a focused instruction body, and no $ARGUMENTS. You invoke it and the output is good. A week later you invoke it again on a different part of the codebase and the output is vague. What's the most likely issue?",
    options: [
      "The skill expired after a week",
      "The instruction body assumed a specific code structure that doesn't apply in the new context",
      "Skills can only be invoked once per session",
      "The command palette cached an old version of the skill"
    ],
    answer: 1,
    explanation: "Skill instructions that assume context (specific file names, patterns, or structures) break when the context changes. Good skills describe the desired behavior abstractly enough to apply across different inputs while still being specific enough to be useful."
  },
  {
    q: "You're building a skill that does three things: runs tests, checks coverage, and writes a summary. It works most of the time but occasionally skips one of the three steps. What's the best fix?",
    options: [
      "Add more detail to the instruction body so Claude has better context",
      "Split it into three separate focused skills, each responsible for one step",
      "Add $ARGUMENTS so you can specify which step to run",
      "Move it from project-level to user-level"
    ],
    answer: 1,
    explanation: "Skills that try to do multiple things fail inconsistently. Each step becomes a silent opportunity for the chain to break. Three focused skills — each with a clear success condition — are more reliable than one that tries to cover all three."
  }
];

let current = 0;
let locked = false;

function renderQuestion() {
  locked = false;
  const item = questions[current];
  document.getElementById("progress").textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById("question").textContent = item.q;
  const optionsEl = document.getElementById("options");
  optionsEl.innerHTML = "";
  item.options.forEach((option, idx) => {
    const button = document.createElement("button");
    button.className = "option";
    button.textContent = option;
    button.addEventListener("click", () => answer(idx));
    optionsEl.appendChild(button);
  });
  document.getElementById("feedback").className = "feedback";
  document.getElementById("feedback").textContent = "";
  document.getElementById("next-btn").style.display = "none";
}

function answer(idx) {
  if (locked) return;
  locked = true;
  const item = questions[current];
  const feedback = document.getElementById("feedback");
  feedback.className = "feedback " + (idx === item.answer ? "correct" : "incorrect");
  feedback.textContent = item.explanation;
  document.getElementById("next-btn").style.display = "inline-block";
}

document.getElementById("next-btn").addEventListener("click", () => {
  current += 1;
  if (current >= questions.length) {
    document.querySelector(".card").innerHTML = "<h2 style='margin-bottom:0.5rem;'>Quiz complete</h2><p style='line-height:1.6;color:#444;'>If you got tripped up on skill placement or instruction specificity, those are the two places skills fail most often. Both are fixable with practice.</p>";
    return;
  }
  renderQuestion();
});

renderQuestion();
</script>
<script src="../../notes-widget.js"></script>
<script src="../../feedback-widget.js"></script>
</body>
</html>
