<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mobile Course Shell</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a1a; }
  .app { max-width: 760px; margin: 0 auto; padding: 1rem 1rem 5rem; }
  .topbar { position: sticky; top: 0; background: rgba(255,255,255,0.96); backdrop-filter: blur(12px); padding: 1rem 0 0.8rem; z-index: 20; }
  h1 { font-size: 1.45rem; line-height: 1.2; margin-bottom: 0.3rem; }
  .subtitle { font-size: 0.9rem; color: #666; margin-bottom: 0.8rem; }
  select { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 0.8rem; font: inherit; background: #fff; margin-bottom: 0.8rem; }
  .meta { font-size: 0.86rem; color: #777; line-height: 1.6; margin-bottom: 1rem; }
  .progress-wrap { margin-bottom: 1rem; }
  .progress-label { font-size: 0.78rem; color: #999; margin-bottom: 0.3rem; }
  .progress-bar { height: 5px; border-radius: 999px; background: #f0f0f0; overflow: hidden; }
  .progress-fill { height: 100%; background: #1a1a1a; width: 0%; }
  .section-title { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.07em; color: #999; font-weight: 700; margin: 1.2rem 0 0.6rem; }
  .module-card { border: 1px solid #eee; border-radius: 14px; padding: 1rem; background: #fff; margin-bottom: 0.9rem; }
  .module-head { display: flex; gap: 0.7rem; align-items: flex-start; }
  .module-card input { margin-top: 0.2rem; width: 18px; height: 18px; accent-color: #1a1a1a; }
  .module-num { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: #999; font-weight: 700; margin-bottom: 0.2rem; }
  .module-name { font-size: 1rem; line-height: 1.35; font-weight: 600; }
  .module-name.checked { text-decoration: line-through; color: #aaa; }
  .module-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.9rem; }
  .btn { border: none; border-radius: 10px; padding: 0.72rem 0.9rem; font: inherit; text-decoration: none; display: inline-block; cursor: pointer; }
  .btn.primary { background: #1a1a1a; color: #fff; }
  .btn.secondary { background: #f5f5f5; color: #333; }
  .resources { display: none; margin-top: 0.9rem; border-top: 1px solid #f0f0f0; padding-top: 0.9rem; }
  .resources.open { display: block; }
  .resource-link { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; color: #333; background: #fafafa; border: 1px solid #eee; border-radius: 10px; padding: 0.8rem; margin-bottom: 0.55rem; }
  .resource-text { flex: 1; min-width: 0; }
  .resource-name { font-size: 0.92rem; font-weight: 600; margin-bottom: 0.15rem; }
  .resource-type { font-size: 0.76rem; color: #888; text-transform: uppercase; letter-spacing: 0.04em; }
  .resource-check { accent-color: #1a1a1a; cursor: pointer; flex-shrink: 0; width: 18px; height: 18px; }
  .footer-links { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 1.2rem; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1 id="title"></h1>
    <div class="subtitle" id="subtitle"></div>
    <select id="subject-select"></select>
    <div class="meta" id="description"></div>
    <div class="progress-wrap">
      <div class="progress-label" id="progress-label"></div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
  </div>

  <div id="module-sections"></div>

  <div class="footer-links">
    <a class="btn secondary" href="index.html">All Subjects</a>
    <a class="btn secondary" id="desktop-link" href="#">Desktop Shell</a>
    <a class="btn secondary" id="syllabus-link" href="#">Syllabus</a>
  </div>
</div>

<script src="course-data.js"></script>
<script>
const subjectMap = Object.fromEntries(window.COURSE_DATA.subjects.map(subject => [subject.slug, subject]));
const params = new URLSearchParams(window.location.search);
let subjectSlug = params.get("subject") || window.COURSE_DATA.defaultSubject;
if (!subjectMap[subjectSlug]) subjectSlug = window.COURSE_DATA.defaultSubject;
let subject = subjectMap[subjectSlug];

function storageKey() { return subject.progressPrefix + "-progress"; }

function loadProgress() {
  try {
    return JSON.parse(localStorage.getItem(storageKey()) || "{}");
  } catch (e) {
    return {};
  }
}

let progress = loadProgress();

function saveProgress() {
  localStorage.setItem(storageKey(), JSON.stringify(progress));
}

function updateHeader() {
  document.title = subject.title + " — Mobile";
  document.getElementById("title").textContent = subject.title;
  document.getElementById("subtitle").textContent = subject.subtitle;
  document.getElementById("description").textContent = subject.description;
  document.getElementById("desktop-link").href = "course.html?subject=" + subject.slug;
  document.getElementById("syllabus-link").href = subject.syllabusHref;

  const select = document.getElementById("subject-select");
  select.innerHTML = "";
  window.COURSE_DATA.subjects.forEach(item => {
    const option = document.createElement("option");
    option.value = item.slug;
    option.textContent = item.title;
    option.selected = item.slug === subject.slug;
    select.appendChild(option);
  });
  select.onchange = event => {
    const nextParams = new URLSearchParams(window.location.search);
    nextParams.set("subject", event.target.value);
    window.location.search = nextParams.toString();
  };
}

function updateProgress() {
  const total = subject.modules.length;
  const done = subject.modules.filter(module => progress["m" + module.num]).length;
  document.getElementById("progress-label").textContent = `${done} / ${total} complete`;
  document.getElementById("progress-fill").style.width = `${Math.round((done / total) * 100)}%`;
}

function toggleResources(moduleNum) {
  document.getElementById("resources-" + moduleNum).classList.toggle("open");
}

function toggleCheck(moduleNum) {
  const key = "m" + moduleNum;
  progress[key] = !progress[key];
  saveProgress();
  renderModules();
  updateProgress();
}

function toggleResourceCheck(moduleNum, idx, event) {
  event.stopPropagation();
  const key = "r" + moduleNum + "-" + idx;
  progress[key] = !progress[key];
  saveProgress();
}

function renderModules() {
  const container = document.getElementById("module-sections");
  container.innerHTML = "";
  const grouped = {};
  subject.modules.forEach(module => {
    if (!grouped[module.section]) grouped[module.section] = [];
    grouped[module.section].push(module);
  });

  Object.keys(subject.sections).forEach(sectionKey => {
    const sectionModules = grouped[sectionKey];
    if (!sectionModules || sectionModules.length === 0) return;
    const title = document.createElement("div");
    title.className = "section-title";
    title.textContent = subject.sections[sectionKey];
    container.appendChild(title);

    sectionModules.forEach(module => {
      const checked = !!progress["m" + module.num];
      const resources = module.resources || [];
      const card = document.createElement("div");
      card.className = "module-card";
      card.innerHTML = `
        <div class="module-head">
          <input type="checkbox" ${checked ? "checked" : ""} onchange="toggleCheck('${module.num}')">
          <div>
            <div class="module-num">${module.num === "C" ? "Capstone" : "Module " + module.num}</div>
            <div class="module-name ${checked ? "checked" : ""}">${module.name}</div>
          </div>
        </div>
        <div class="module-actions">
          ${resources.length ? `<button class="btn primary" onclick="toggleResources('${module.num}')">Open Resources</button>` : `<span class="btn secondary">Coming Soon</span>`}
          ${resources.length ? `<a class="btn secondary" href="${resources[0].href}">Open First Item</a>` : ""}
        </div>
        <div class="resources" id="resources-${module.num}">
          ${resources.map((resource, idx) => { const rChecked = !!progress["r" + module.num + "-" + idx]; return `<a class="resource-link" href="${resource.href}"><div class="resource-text"><div class="resource-name">${resource.name}</div><div class="resource-type">${resource.type}</div></div><input class="resource-check" type="checkbox" ${rChecked ? "checked" : ""} onclick="toggleResourceCheck('${module.num}', ${idx}, event)"></a>`; }).join("")}
        </div>
      `;
      container.appendChild(card);
    });
  });
}

updateHeader();
updateProgress();
renderModules();
</script>
</body>
</html>
