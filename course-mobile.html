<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Claude Code Course">
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="Learn to use Claude Code effectively - from concepts to delivery">
    <title>Claude Code Course</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            padding-top: max(0px, env(safe-area-inset-top));
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        #app {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            max-height: 100vh;
            overflow: hidden;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-bottom: max(60px, env(safe-area-inset-bottom));
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        /* Bottom tab bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            height: 60px;
            background: #ffffff;
            border-top: 1px solid #e5e5e5;
            padding-bottom: max(0px, env(safe-area-inset-bottom));
            z-index: 100;
        }

        .tab-button {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 10px;
            color: #999;
            padding: 0;
            -webkit-appearance: none;
        }

        .tab-button.active {
            color: #0a84ff;
            font-weight: 600;
        }

        .tab-icon {
            font-size: 24px;
        }

        .tab-label {
            font-size: 10px;
        }

        /* Sub-tab navigation (horizontal pills) */
        .subtab-nav {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            border-bottom: 1px solid #e5e5e5;
            white-space: nowrap;
        }

        .subtab-nav::-webkit-scrollbar {
            height: 0;
        }

        .subtab-button {
            padding: 8px 14px;
            border: 1px solid #e5e5e5;
            border-radius: 20px;
            background: #f9f9f9;
            color: #1a1a1a;
            font-size: 14px;
            cursor: pointer;
            flex-shrink: 0;
            -webkit-appearance: none;
            font-family: inherit;
            min-height: 44px;
            display: flex;
            align-items: center;
        }

        .subtab-button.active {
            background: #0a84ff;
            color: #ffffff;
            border-color: #0a84ff;
            font-weight: 600;
        }

        /* Module list */
        .module-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 20px;
        }

        .module-card {
            padding: 16px;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            background: #ffffff;
        }

        .module-card.disabled {
            opacity: 0.5;
        }

        .module-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .module-subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }

        .module-button {
            padding: 10px 16px;
            background: #0a84ff;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            -webkit-appearance: none;
            font-family: inherit;
            font-weight: 600;
            min-height: 44px;
        }

        .module-button:active {
            opacity: 0.8;
        }

        .module-button.disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Header */
        .lesson-header {
            padding: 20px;
            border-bottom: 1px solid #e5e5e5;
        }

        .lesson-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .lesson-subtitle {
            font-size: 14px;
            color: #666;
        }

        /* Content sections */
        .lesson-content {
            padding: 20px;
        }

        .concept {
            margin-bottom: 24px;
        }

        .concept-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .concept-text {
            font-size: 16px;
            line-height: 1.6;
            color: #333;
        }

        .concept-list {
            font-size: 16px;
            line-height: 1.8;
            color: #333;
            margin-left: 0;
            list-style: none;
        }

        .concept-list li {
            margin-bottom: 8px;
            padding-left: 24px;
            position: relative;
        }

        .concept-list li:before {
            content: "•";
            position: absolute;
            left: 0;
        }

        .concept-list li strong {
            font-weight: 600;
        }

        code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: "Monaco", "Menlo", "Courier New", monospace;
            font-size: 14px;
        }

        /* Slides */
        .slides-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .slides-viewer {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .slide {
            display: none;
            width: 100%;
            height: 100%;
            padding: 40px 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .slide.active {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .slide-content {
            width: 100%;
        }

        .slide-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .slide-subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }

        .slide-list {
            font-size: 18px;
            line-height: 1.8;
            list-style: none;
        }

        .slide-list li {
            margin-bottom: 12px;
            padding-left: 24px;
            position: relative;
        }

        .slide-list li:before {
            content: "•";
            position: absolute;
            left: 0;
        }

        .slides-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-top: 1px solid #e5e5e5;
            gap: 12px;
        }

        .slide-nav-button {
            padding: 10px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            -webkit-appearance: none;
            font-family: inherit;
            font-size: 16px;
            min-height: 44px;
            min-width: 44px;
        }

        .slide-nav-button:active {
            background: #e0e0e0;
        }

        .slide-indicators {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex: 1;
        }

        .slide-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d0d0d0;
            cursor: pointer;
        }

        .slide-dot.active {
            background: #0a84ff;
        }

        .slide-counter {
            font-size: 14px;
            color: #666;
            min-width: 60px;
            text-align: right;
        }

        /* Explorer */
        .explorer-card {
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .explorer-header {
            padding: 16px;
            background: #f9f9f9;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 44px;
            -webkit-user-select: none;
            user-select: none;
        }

        .explorer-header-text {
            font-weight: 600;
            font-size: 16px;
        }

        .explorer-toggle {
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        .explorer-toggle.open {
            transform: rotate(180deg);
        }

        .explorer-body {
            display: none;
            padding: 16px;
            background: #ffffff;
            border-top: 1px solid #e5e5e5;
        }

        .explorer-body.open {
            display: block;
        }

        .explorer-question {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .explorer-answer {
            font-size: 16px;
            color: #333;
            line-height: 1.6;
        }

        /* Quiz */
        .quiz-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .quiz-progress {
            font-size: 14px;
            color: #666;
            font-weight: 600;
        }

        .quiz-question {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .quiz-option {
            padding: 14px;
            border: 2px solid #e5e5e5;
            border-radius: 8px;
            background: #ffffff;
            cursor: pointer;
            font-size: 16px;
            min-height: 44px;
            display: flex;
            align-items: center;
            -webkit-appearance: none;
            font-family: inherit;
        }

        .quiz-option:active {
            background: #f0f0f0;
        }

        .quiz-option.selected {
            border-color: #0a84ff;
            background: #f0f8ff;
        }

        .quiz-option.correct {
            border-color: #34c759;
            background: #f0fdf4;
        }

        .quiz-option.incorrect {
            border-color: #ff3b30;
            background: #fef2f2;
        }

        .quiz-feedback {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 12px;
        }

        .quiz-feedback.correct {
            background: #f0fdf4;
            color: #166534;
        }

        .quiz-feedback.incorrect {
            background: #fef2f2;
            color: #991b1b;
        }

        .quiz-next-button {
            padding: 12px 16px;
            background: #0a84ff;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            -webkit-appearance: none;
            font-family: inherit;
            font-weight: 600;
            min-height: 44px;
            margin-top: 12px;
        }

        .quiz-results {
            text-align: center;
            padding: 20px 0;
        }

        .quiz-score {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .quiz-results-text {
            font-size: 18px;
            color: #666;
        }

        /* Flashcards */
        .flashcards-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .flashcard-counter {
            font-size: 14px;
            color: #666;
            text-align: center;
        }

        .flashcard {
            perspective: 1000px;
            height: 300px;
            cursor: pointer;
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .flashcard-inner.flipped {
            transform: rotateY(180deg);
        }

        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #0a84ff;
            border-radius: 12px;
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            line-height: 1.5;
        }

        .flashcard-front {
            background: #f0f8ff;
            color: #1a1a1a;
        }

        .flashcard-back {
            background: #0a84ff;
            color: #ffffff;
            transform: rotateY(180deg);
        }

        .flashcard-label {
            position: absolute;
            top: 12px;
            left: 12px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .flashcard-front .flashcard-label {
            background: rgba(0, 132, 255, 0.2);
            color: #0a84ff;
        }

        .flashcard-back .flashcard-label {
            background: rgba(255, 255, 255, 0.3);
            color: #ffffff;
        }

        .flashcard-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .flashcard-button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            -webkit-appearance: none;
            font-family: inherit;
            font-weight: 600;
            min-height: 44px;
        }

        .button-got-it {
            background: #34c759;
            color: #ffffff;
        }

        .button-review {
            background: #ff9500;
            color: #ffffff;
        }

        /* Reference card */
        .reference-container {
            padding: 20px;
        }

        .reference-section {
            margin-bottom: 24px;
        }

        .reference-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #0a84ff;
        }

        .reference-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .reference-item {
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
        }

        .reference-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .reference-table th,
        .reference-table td {
            padding: 8px;
            border: 1px solid #e5e5e5;
            text-align: left;
        }

        .reference-table th {
            background: #f0f0f0;
            font-weight: 600;
        }

        /* Capability Matrix */
        .matrix-filters {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-bottom: 1px solid #e5e5e5;
            white-space: nowrap;
        }

        .matrix-filter-button {
            padding: 8px 12px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            background: #f9f9f9;
            font-size: 14px;
            cursor: pointer;
            -webkit-appearance: none;
            font-family: inherit;
            flex-shrink: 0;
        }

        .matrix-filter-button.active {
            background: #0a84ff;
            color: #ffffff;
            border-color: #0a84ff;
            font-weight: 600;
        }

        .matrix-container {
            padding: 12px;
        }

        .matrix-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e5e5e5;
            font-size: 14px;
        }

        .matrix-row.hidden {
            display: none;
        }

        .matrix-name {
            flex: 0 0 35%;
            font-weight: 600;
            font-size: 15px;
        }

        .matrix-score {
            flex: 0 0 45%;
        }

        .matrix-bar {
            background: #e5e5e5;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .matrix-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .matrix-fill.green {
            background: #34c759;
        }

        .matrix-fill.yellow {
            background: #ff9500;
        }

        .matrix-fill.red {
            background: #ff3b30;
        }

        .matrix-value {
            margin-top: 4px;
            font-weight: 600;
            font-size: 12px;
            color: #666;
        }

        /* Builder */
        .builder-container {
            display: flex;
            flex-direction: column;
            gap: 0;
            height: 100%;
        }

        .builder-form {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .builder-section {
            margin-bottom: 20px;
        }

        .builder-section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            padding: 12px;
            background: #f0f0f0;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
        }

        .builder-section-toggle {
            font-size: 16px;
            transition: transform 0.3s ease;
        }

        .builder-section-toggle.open {
            transform: rotate(180deg);
        }

        .builder-section-content {
            display: none;
            padding: 12px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            gap: 12px;
            flex-direction: column;
        }

        .builder-section-content.open {
            display: flex;
        }

        .builder-label {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .builder-input,
        .builder-select,
        .builder-textarea {
            padding: 10px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            font-family: inherit;
            font-size: 16px;
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
        }

        .builder-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .builder-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .builder-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: #0a84ff;
            color: #ffffff;
            border-radius: 12px;
            font-size: 14px;
        }

        .builder-tag-remove {
            cursor: pointer;
            font-weight: bold;
        }

        .builder-checkboxes {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .builder-checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px;
        }

        .builder-checkbox-item input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            border: 2px solid #ccc;
            border-radius: 4px;
            background: #ffffff;
        }

        .builder-checkbox-item input:checked {
            background: #0a84ff;
            border-color: #0a84ff;
        }

        .builder-preview {
            padding: 16px;
            background: #1a1a1a;
            color: #fff;
            border-radius: 6px;
            font-family: "Monaco", "Menlo", "Courier New", monospace;
            font-size: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 300px;
            overflow-y: auto;
        }

        .builder-actions {
            display: flex;
            gap: 12px;
            padding: 16px;
            border-top: 1px solid #e5e5e5;
        }

        .builder-action-button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            -webkit-appearance: none;
            font-family: inherit;
            font-weight: 600;
            min-height: 44px;
        }

        .button-copy {
            background: #0a84ff;
            color: #ffffff;
        }

        .button-reset {
            background: #f0f0f0;
            color: #1a1a1a;
        }

        /* Utility classes */
        .hidden {
            display: none !important;
        }

        .page {
            display: none;
        }

        .page.active {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

    <div id="app"></div>

    <script>
        // ============================================================================
        // APP STATE
        // ============================================================================
        const state = {
            activeTab: 'home',
            m1SubTab: 'lesson',
            m2SubTab: 'lesson',
            m1Quiz: { current: 0, answers: {}, showResults: false },
            m2Quiz: { current: 0, answers: {}, showResults: false },
            m1Cards: { current: 0, flipped: false, known: new Set(), review: new Set() },
            m2Cards: { current: 0, flipped: false, known: new Set(), review: new Set() },
            m1Slide: 0,
            m1Explorer: { expandedCards: {} },
            m2Explorer: { expandedCards: {} },
            matrixFilter: 'all',
            builder: {
                level: 'project',
                projectName: 'My Project',
                projectDesc: '',
                techStack: [],
                indent: '4-spaces',
                naming: '',
                patterns: {},
                testFramework: 'jest',
                buildTool: 'webpack',
                packageManager: 'npm',
                lintRules: '',
                workingStyle: {},
                sop: '',
                antiPatterns: ''
            }
        };

        // ============================================================================
        // CONTENT DATA
        // ============================================================================

        const M1_LESSON_HTML = `
            <div class="lesson-content">
                <div class="concept">
                    <h3 class="concept-title">Concept 1: The Agentic Loop</h3>
                    <ul class="concept-list">
                        <li><strong>Read phase:</strong> examines request, reads code files, checks project context, builds mental model</li>
                        <li><strong>Plan phase:</strong> thinks through approach, considers strategies, identifies edge cases</li>
                        <li><strong>Act phase:</strong> executes — writes code, runs commands, modifies files</li>
                        <li><strong>Verify phase:</strong> checks if it worked, loops back if not</li>
                        <li>Self-correcting within sessions, but not infinite — compaction/token limits apply</li>
                        <li><strong>Example:</strong> signup form validation — Read existing component, Plan email regex + password checks, Act to modify file, Verify tests pass, loop if fail</li>
                    </ul>
                </div>

                <div class="concept">
                    <h3 class="concept-title">Concept 2: Environments</h3>
                    <ul class="concept-list">
                        <li><strong>Terminal CLI</strong> (claude command): context = current dir, shell history, command output; best for file ops, quick scripts; tradeoff = limited system context</li>

                cards.review.delete(currentCardIdx);

                cards.review.add(currentCardIdx);

                cards.current++;
                cards.flipped = false;
                render();
            }

        function generateCLAUDEmd() {
            const b = state.builder;
            const level = b.level || 'project';
            const lines = [];

            lines.push(`# CLAUDE.md (${level})`);
            lines.push('');

            if (b.projectName) {
                lines.push(`## Project: ${b.projectName}`);
                lines.push('');
                if (b.projectDesc) {
                    lines.push(b.projectDesc);
                    lines.push('');
                }
            }

            if (b.techStack && b.techStack.length > 0) {
                lines.push('## Tech Stack');
                b.techStack.forEach(tag => {
                    lines.push(`- ${tag}`);
                });
                lines.push('');
            }

            if (b.indent || b.naming || (b.patterns && Object.keys(b.patterns).length > 0)) {
                lines.push('## Coding Conventions');
                if (b.indent) {
                    lines.push(`Indentation: ${b.indent}`);
                }
                if (b.naming) {
                    lines.push(`Naming: ${b.naming}`);
                }
                if (b.patterns && Object.keys(b.patterns).length > 0) {
                    lines.push('Patterns:');
                    Object.keys(b.patterns).forEach(key => {
                        if (b.patterns[key]) {
                            lines.push(`- ${key}`);
                        }
                    });
                }
                lines.push('');
            }

            if (b.testFramework || b.buildTool || b.packageManager || b.lintRules) {
                lines.push('## Tools & Configuration');
                if (b.testFramework) lines.push(`Testing: ${b.testFramework}`);
                if (b.buildTool) lines.push(`Build: ${b.buildTool}`);
                if (b.packageManager) lines.push(`Package Manager: ${b.packageManager}`);
                if (b.lintRules) {
                    lines.push('Linting:');
                    lines.push(b.lintRules);
                }
                lines.push('');
            }

            if (b.workingStyle && Object.keys(b.workingStyle).length > 0) {
                lines.push('## Working Style');
                Object.keys(b.workingStyle).forEach(key => {
                    if (b.workingStyle[key]) {
                        lines.push(`- ${key}`);
                    }
                });
                lines.push('');
            }

            if (b.sop) {
                lines.push('## Standard Operating Procedure');
                lines.push(b.sop);
                lines.push('');
            }

            if (b.antiPatterns) {
                lines.push('## Anti-Patterns to Avoid');
                lines.push(b.antiPatterns);
                lines.push('');
            }

            return lines.join('\n');
        }

        function copyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');

            alert('CLAUDE.md copied to clipboard!');
        }

        function renderM1Quiz() {
            const quiz = state.m1Quiz;
            const questions = M1_QUIZ;
            const q = questions[quiz.current];
            const answered = quiz.answers[quiz.current] !== undefined;
            const selectedAnswer = quiz.answers[quiz.current];

            if (quiz.current === questions.length && Object.keys(quiz.answers).length === questions.length) {
                let score = 0;
                questions.forEach((question, idx) => {
                    if (quiz.answers[idx] === question.correct) score++;
                });
                const percentage = Math.round((score / questions.length) * 100);
                return `
                    <div class="quiz-container">
                        <div class="quiz-results">
                            <div class="quiz-score">${percentage}%</div>
                            <div class="quiz-results-text">You got ${score} out of ${questions.length} correct</div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="content-scroll">
                    <div class="quiz-container">
                        <div class="quiz-progress">Question ${quiz.current + 1} of ${questions.length}</div>
                        <div class="quiz-question">${q.q}</div>
                        <div class="quiz-options">
                            ${q.opts.map((opt, idx) => {
                                let className = 'quiz-option';
                                if (answered) {
                                    if (idx === q.correct) className += ' correct';
                                    else if (idx === selectedAnswer) className += ' incorrect';
                                }
                                if (idx === selectedAnswer && !quiz.showResults) className += ' selected';
                                return `<button class="${className}" onclick="answerQuiz(1, ${idx})">${opt}</button>`;
                            }).join('')}
                        </div>
                        ${quiz.showResults ? `
                            <div class="quiz-feedback ${selectedAnswer === q.correct ? 'correct' : 'incorrect'}">
                                ${selectedAnswer === q.correct ? '✓ Correct!' : '✗ Incorrect'}
                                <p>${q.explain}</p>
                            </div>
                            <button class="quiz-next-button" onclick="nextQuizQuestion(1)">
                                ${quiz.current < questions.length - 1 ? 'Next' : 'Finish'}
                            </button>
                        ` : `
                            <button class="quiz-next-button" onclick="submitQuizQuestion(1)">Submit</button>
                        `}
                    </div>
                </div>
            `;
        }

            const questions = M2_QUIZ;
            const q = questions[quiz.current];
            const answered = quiz.answers[quiz.current] !== undefined;
            const selectedAnswer = quiz.answers[quiz.current];

            if (quiz.current === questions.length && Object.keys(quiz.answers).length === questions.length) {
                let score = 0;
                questions.forEach((question, idx) => {
                    if (quiz.answers[idx] === question.correct) score++;
                });
                const percentage = Math.round((score / questions.length) * 100);
                return `
                    <div class="quiz-container">
                        <div class="quiz-results">
                            <div class="quiz-score">${percentage}%</div>
                            <div class="quiz-results-text">You got ${score} out of ${questions.length} correct</div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="content-scroll">
                    <div class="quiz-container">
                        <div class="quiz-progress">Question ${quiz.current + 1} of ${questions.length}</div>
                        <div class="quiz-question">${q.q}</div>
                        <div class="quiz-options">
                            ${q.opts.map((opt, idx) => {
                                let className = 'quiz-option';
                                if (answered) {
                                    if (idx === q.correct) className += ' correct';
                                    else if (idx === selectedAnswer) className += ' incorrect';
                                }
                                if (idx === selectedAnswer && !quiz.showResults) className += ' selected';
                                return `<button class="${className}" onclick="answerQuiz(2, ${idx})">${opt}</button>`;
                            }).join('')}
                        </div>
                        ${quiz.showResults ? `
                            <div class="quiz-feedback ${selectedAnswer === q.correct ? 'correct' : 'incorrect'}">
                                ${selectedAnswer === q.correct ? '✓ Correct!' : '✗ Incorrect'}
                                <p>${q.explain}</p>
                            </div>
                            <button class="quiz-next-button" onclick="nextQuizQuestion(2)">
                                ${quiz.current < questions.length - 1 ? 'Next' : 'Finish'}
                            </button>
                        ` : `
                            <button class="quiz-next-button" onclick="submitQuizQuestion(2)">Submit</button>
                        `}
                    </div>
                </div>
            `;
        }

        function renderM2Flashcards() {
            const cards = state.m2Cards;
            const cardList = M2_FLASHCARDS;
            const card = cardList[cards.current];

            return `
                <div class="flashcards-container">
                    <div class="flashcard-counter">Card ${cards.current + 1} of ${cardList.length}</div>
                    <div class="flashcard" onclick="flipFlashcard(2)">
                        <div class="flashcard-inner ${cards.flipped ? 'flipped' : ''}">
                            <div class="flashcard-face flashcard-front">
                                <span class="flashcard-label">Front</span>
                                ${card.front}
                            </div>
                            <div class="flashcard-face flashcard-back">
                                <span class="flashcard-label">Back</span>
                                ${card.back}
                            </div>
                        </div>
                    </div>
                    ${cards.flipped ? `
                        <div class="flashcard-buttons">
                            <button class="flashcard-button button-got-it" onclick="markFlashcard(2, 'got-it')">Got it</button>
                            <button class="flashcard-button button-review" onclick="markFlashcard(2, 'needs-review')">Needs Review</button>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderM2Reference() {
            return `
                <div class="content-scroll">
                    <div class="reference-container">
                        <div class="reference-section">
                            <h3 class="reference-title">What is CLAUDE.md?</h3>
                            <p style="font-size: 16px; line-height: 1.6;">A plain text file loaded at session start. Persistent conventions, preferences, team standards.</p>
                        </div>

                        <div class="reference-section">
                            <h3 class="reference-title">File Locations</h3>
                            <table class="reference-table">
                                <tr>
                                    <th>Location</th>
                                    <th>Scope</th>
                                </tr>
                                <tr>
                                    <td>Global</td>
                                    <td>All projects</td>
                                </tr>
                                <tr>
                                    <td>Project</td>
                                    <td>One project</td>
                                </tr>
                                <tr>
                                    <td>Folder</td>
                                    <td>Specific folder</td>
                                </tr>
                            </table>
                        </div>

                        <div class="reference-section">
                            <h3 class="reference-title">CLAUDE.md vs Prompt</h3>
                            <table class="reference-table">
                                <tr>
                                    <th>CLAUDE.md</th>
                                    <th>Prompt</th>
                                </tr>
                                <tr>
                                    <td>Convention (how)</td>
                                    <td>Task (what)</td>
                                </tr>
                                <tr>
                                    <td>Persists across sessions</td>
                                    <td>One conversation only</td>
                                </tr>
                                <tr>
                                    <td>Coding standards, rules</td>
                                    <td>Feature requests, questions</td>
                                </tr>
                            </table>
                        </div>

                        <div class="reference-section">
                            <h3 class="reference-title">Effective Instructions</h3>
                            <div style="font-size: 16px; line-height: 1.8;">
                                <div>• State framework/decision process first</div>
                                <div>• Be specific with constraints</div>
                                <div>• Include examples of good/bad</div>
                                <div>• List tools and versions</div>
                                <div>• Say what to ignore</div>
                            </div>
                        </div>

                        <div class="reference-section">
                            <h3 class="reference-title">Anti-Patterns</h3>
                            <div style="font-size: 16px; line-height: 1.8;">
                                <div>• Too long (&gt;500 lines)</div>
                                <div>• Too vague ("be helpful")</div>
                                <div>• Contradictory rules</div>
                                <div>• Feature-specific content</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function render() {
            const app = document.getElementById('app');
            let content = '';
            let subtabs = '';

            if (state.activeTab === 'home') {
                content = renderHome();
            } else if (state.activeTab === 'module1') {
                const subTabs = ['Lesson', 'Slides', 'Explorer', 'Quiz', 'Flashcards', 'Reference', 'Matrix'];
                subtabs = `<div class="subtab-nav">${subTabs.map(tab => `
                    <button class="subtab-button ${state.m1SubTab === tab.toLowerCase() ? 'active' : ''}" onclick="setM1SubTab('${tab.toLowerCase()}')">
                        ${tab}
                    </button>
                `).join('')}</div>`;

                switch (state.m1SubTab) {
                    case 'lesson': content = renderM1Lesson(); break;
                    case 'slides': content = renderM1Slides(); break;
                    case 'explorer': content = renderM1Explorer(); break;
                    case 'quiz': content = renderM1Quiz(); break;
                    case 'flashcards': content = renderM1Flashcards(); break;
                    case 'reference': content = renderM1Reference(); break;
                    case 'matrix': content = renderM1Matrix(); break;
                }
            } else if (state.activeTab === 'module2') {
                const subTabs = ['Lesson', 'Builder', 'Quiz', 'Flashcards', 'Reference'];
                subtabs = `<div class="subtab-nav">${subTabs.map(tab => `
                    <button class="subtab-button ${state.m2SubTab === tab.toLowerCase() ? 'active' : ''}" onclick="setM2SubTab('${tab.toLowerCase()}')">
                        ${tab}
                    </button>
                `).join('')}</div>`;

                switch (state.m2SubTab) {
                    case 'lesson': content = renderM2Lesson(); break;
                    case 'builder': content = renderM2Builder(); break;
                    case 'quiz': content = renderM2Quiz(); break;
                    case 'flashcards': content = renderM2Flashcards(); break;
                    case 'reference': content = renderM2Reference(); break;
                }
            }

            const tabBar = `
                <div class="tab-bar">
                    <button class="tab-button ${state.activeTab === 'home' ? 'active' : ''}" onclick="setActiveTab('home')">
                        <div class="tab-icon">🏠</div>
                        <div class="tab-label">Home</div>
                    </button>
                    <button class="tab-button ${state.activeTab === 'module1' ? 'active' : ''}" onclick="setActiveTab('module1')">
                        <div class="tab-icon">1️⃣</div>
                        <div class="tab-label">Module 1</div>
                    </button>
                    <button class="tab-button ${state.activeTab === 'module2' ? 'active' : ''}" onclick="setActiveTab('module2')">
                        <div class="tab-icon">2️⃣</div>
                        <div class="tab-label">Module 2</div>
                    </button>
                </div>
            `;

            app.innerHTML = `
                <div class="content-area">
                    ${subtabs}
                    <div class="content-scroll" ${state.activeTab === 'home' ? 'style="flex: 1; overflow: hidden;"' : ''}>
                        ${content}
                    </div>
                </div>
                ${tabBar}
            `;

            // Re-attach slide swipe listeners if needed
            if (state.activeTab === 'module1' && state.m1SubTab === 'slides') {
                attachSlideSwipe();
            }
        }

        function attachSlideSwipe() {
            const viewer = document.querySelector('.slides-viewer');
            if (!viewer) return;

            let touchStart = 0;
            viewer.addEventListener('touchstart', e => {
                touchStart = e.touches[0].clientX;
            });

            viewer.addEventListener('touchend', e => {
                const touchEnd = e.changedTouches[0].clientX;
                const diff = touchStart - touchEnd;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) nextSlide();
                    else prevSlide();
                }
            });
        }

        // ============================================================================
        // INITIALIZE
        // ============================================================================

        render();
    </script>
</body>
</html>
